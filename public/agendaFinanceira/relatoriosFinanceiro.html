<!DOCTYPE html>
<!--
  ARQUIVO: public/agendaFinanceira/relatoriosFinanceiro.html
  VERSAO:  1.0.0
  DATA:    2026-03-06
  DESCRICAO: Relatorios da Agenda Financeira
-->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatorios — Agenda Financeira</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/menu.css">
    <style>
        :root {
            --bg:      #0f172a;
            --card:    #1e293b;
            --card2:   #243044;
            --text:    #f1f5f9;
            --gray:    #94a3b8;
            --border:  #334155;
            --primary: #10b981;
            --green:   #10b981;
            --red:     #ef4444;
            --amber:   #f59e0b;
            --blue:    #3b82f6;
            --purple:  #a78bfa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .page { max-width: 1400px; margin: 0 auto; padding: 80px 20px 60px; }

        /* Cabecalho */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
        }
        .page-header h1 { font-size: 1.5rem; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        .btn-voltar {
            background: var(--card); border: 1px solid var(--border); color: var(--gray);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            text-decoration: none; display: flex; align-items: center; gap: 6px;
        }
        .btn-voltar:hover { color: var(--text); border-color: var(--primary); }

        /* Painel de Filtros */
        .filtros-panel {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; margin-bottom: 24px;
        }
        .filtros-panel h3 { font-size: 0.8rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; color: var(--primary); margin-bottom: 16px; }

        .periodo-rapido { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .btn-periodo {
            background: var(--card2); border: 1px solid var(--border); color: var(--gray);
            padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-periodo:hover, .btn-periodo.ativo { background: var(--primary); border-color: var(--primary); color: #fff; }

        .filtros-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px;
            margin-bottom: 16px;
        }
        .filtro-group label { display: block; font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; color: var(--gray); margin-bottom: 6px; }
        .filtro-group input, .filtro-group select {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 0.85rem; outline: none;
        }
        .filtro-group input:focus, .filtro-group select:focus { border-color: var(--primary); }

        .tipo-btns { display: flex; gap: 10px; }
        .btn-tipo {
            flex: 1; padding: 10px; background: var(--card2); border: 2px solid var(--border);
            border-radius: 8px; color: var(--gray); cursor: pointer; text-align: center; font-size: 0.85rem;
        }
        .btn-tipo.ativo { border-color: var(--primary); color: var(--primary); background: rgba(16,185,129,0.1); }

        .btn-gerar {
            width: 100%; padding: 13px; background: var(--primary); border: none; border-radius: 8px;
            color: #fff; font-size: 0.95rem; font-weight: 900; cursor: pointer; letter-spacing: 0.5px;
            transition: background 0.2s; margin-top: 4px;
        }
        .btn-gerar:hover { background: #059669; }
        .btn-gerar:disabled { background: #334155; color: var(--gray); cursor: not-allowed; }

        /* Resultados */
        #resultado { display: none; }
        .resultado-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
        }
        .resultado-header h2 { font-size: 1.1rem; color: var(--text); }
        .resultado-header span { font-size: 0.8rem; color: var(--gray); }
        .btn-exportar {
            background: var(--blue); border: none; color: #fff; padding: 8px 18px;
            border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 700;
        }
        .btn-exportar:hover { background: #2563eb; }

        /* Cards de totais */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .card-stat {
            background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 16px; text-align: center;
        }
        .card-stat .val { font-size: 1.6rem; font-weight: 900; line-height: 1; }
        .card-stat .val.val-brl { font-size: 1.1rem; }
        .card-stat .lbl { font-size: 0.72rem; color: var(--gray); text-transform: uppercase;
            letter-spacing: 0.5px; margin-top: 6px; }
        .c-total   .val { color: var(--blue); }
        .c-valor   .val { color: var(--green); }
        .c-pend    .val { color: var(--amber); }
        .c-pago    .val { color: var(--green); }
        .c-venc    .val { color: var(--red); }

        /* Secao grafico/tabela */
        .secao { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .secao h3 { font-size: 0.75rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; color: var(--gray); margin-bottom: 16px; }

        /* Grafico de barras CSS */
        .bar-chart { display: flex; flex-direction: column; gap: 10px; }
        .bar-row { display: grid; grid-template-columns: 160px 1fr 110px; align-items: center; gap: 10px; }
        .bar-label { font-size: 0.82rem; text-align: right; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bar-track { background: rgba(255,255,255,0.05); border-radius: 4px; height: 20px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; background: var(--primary); }
        .bar-fill.pend { background: var(--amber); }
        .bar-fill.venc { background: var(--red); }
        .bar-count { font-size: 0.78rem; font-weight: 700; color: var(--text); text-align: right; }

        /* Tabelas */
        .tbl-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
        th { background: rgba(255,255,255,0.05); color: var(--gray); font-weight: 700;
            text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.5px;
            padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(51,65,85,0.4); vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.03); }
        tr:last-child td { border-bottom: none; }
        .td-num { text-align: right; font-variant-numeric: tabular-nums; }
        .td-center { text-align: center; }

        /* Checkboxes agendas */
        .agendas-check-list {
            display: flex; flex-wrap: wrap; gap: 8px 16px;
            background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 14px; max-height: 120px; overflow-y: auto;
        }
        .agendas-check-list label {
            display: flex; align-items: center; gap: 6px; font-size: 0.82rem;
            cursor: pointer; white-space: nowrap; color: var(--text);
        }
        .agendas-check-list input[type="checkbox"] {
            accent-color: var(--primary); width: 15px; height: 15px; cursor: pointer;
        }
        .agendas-check-list .check-todos {
            font-weight: 700; color: var(--primary); border-right: 1px solid var(--border);
            padding-right: 16px; margin-right: 4px;
        }
        .loading-sm { color: var(--gray); font-size: 0.8rem; }

        /* Ordenação nas colunas */
        .th-sort { cursor: pointer; user-select: none; white-space: nowrap; }
        .th-sort:hover { color: var(--primary); }
        .th-sort i { font-size: 0.6rem; margin-left: 4px; opacity: 0.4; }
        .th-sort.asc i, .th-sort.desc i { opacity: 1; color: var(--primary); }

        /* Filtros na tabela */
        .filtros-tabela th { padding: 4px 6px; background: rgba(255,255,255,0.02); }
        .filtros-tabela input,
        .filtros-tabela select {
            width: 100%; padding: 5px 8px; font-size: 0.75rem;
            background: var(--surface); color: var(--text); border: 1px solid var(--border);
            border-radius: 4px; outline: none;
        }
        .filtros-tabela input:focus,
        .filtros-tabela select:focus { border-color: var(--primary); }
        .filtros-tabela input::placeholder { color: var(--gray); opacity: 0.6; }

        /* Badges */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
        .b-pago    { background: rgba(16,185,129,0.15); color: #10b981; }
        .b-pend    { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .b-venc    { background: rgba(239,68,68,0.15);  color: #ef4444; }

        /* Loading */
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px;
            color: var(--gray); gap: 12px; font-size: 0.9rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite; }

        .sem-dados { text-align: center; padding: 30px; color: var(--gray); font-size: 0.85rem; }

        /* Paginacao */
        .paginacao { display: flex; align-items: center; justify-content: space-between;
            margin-top: 16px; flex-wrap: wrap; gap: 10px; }
        .paginacao span { font-size: 0.8rem; color: var(--gray); }
        .pag-btns { display: flex; gap: 6px; }
        .btn-pag {
            background: var(--card2); border: 1px solid var(--border); color: var(--gray);
            padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .btn-pag:hover { border-color: var(--primary); color: var(--text); }
        .btn-pag:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Grid 2 colunas para graficos lado a lado */
        .secao-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

        @media (max-width: 768px) {
            .filtros-grid { grid-template-columns: 1fr; }
            .bar-row { grid-template-columns: 100px 1fr 90px; }
            .secao-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="menu-container"></div>
<div class="page">

    <!-- Filtros -->
    <div class="filtros-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <h3 style="margin:0;"><i class="fas fa-filter"></i> Filtros</h3>
            <a href="/agendaFinanceira" class="btn-voltar"><i class="fas fa-arrow-left"></i> Agenda Financeira</a>
        </div>

        <div class="periodo-rapido">
            <button class="btn-periodo" onclick="setPeriodo('hoje',this)">Hoje</button>
            <button class="btn-periodo" onclick="setPeriodo('semana',this)">Esta Semana</button>
            <button class="btn-periodo ativo" onclick="setPeriodo('mes',this)">Este Mes</button>
            <button class="btn-periodo" onclick="setPeriodo('trimestre',this)">Trimestre</button>
            <button class="btn-periodo" onclick="setPeriodo('ano',this)">Este Ano</button>
            <button class="btn-periodo" onclick="setPeriodo('custom',this)">Personalizado</button>
        </div>

        <div id="datas-custom" class="filtros-grid" style="display:none">
            <div class="filtro-group">
                <label>Data Inicio</label>
                <input type="date" id="f-di">
            </div>
            <div class="filtro-group">
                <label>Data Fim</label>
                <input type="date" id="f-df">
            </div>
        </div>

        <div class="filtro-group" style="margin-bottom:12px;">
            <label>Agendas</label>
            <div id="f-agendas-check" class="agendas-check-list">
                <span class="loading-sm">Carregando...</span>
            </div>
        </div>

        <div class="filtros-grid">
            <div class="filtro-group">
                <label>Categoria</label>
                <select id="f-categoria">
                    <option value="">Todas as categorias</option>
                </select>
            </div>
            <div class="filtro-group">
                <label>Empresa</label>
                <select id="f-empresa">
                    <option value="">Todas as empresas</option>
                </select>
            </div>
            <div class="filtro-group">
                <label>Status</label>
                <select id="f-status">
                    <option value="todos">Todos</option>
                    <option value="pendente">Pendente</option>
                    <option value="pago">Pago</option>
                </select>
            </div>
            <div class="filtro-group">
                <label>Tipo de Relatorio</label>
                <div class="tipo-btns">
                    <button class="btn-tipo ativo" id="btn-resumido" onclick="setTipo('resumido')">
                        <i class="fas fa-chart-pie"></i> Resumido
                    </button>
                    <button class="btn-tipo" id="btn-detalhado" onclick="setTipo('detalhado')">
                        <i class="fas fa-list"></i> Detalhado
                    </button>
                </div>
            </div>
        </div>

        <button class="btn-gerar" id="btn-gerar" onclick="gerarRelatorio()">
            <i class="fas fa-sync-alt"></i> GERAR RELATORIO
        </button>
    </div>

    <div id="resultado"></div>

</div>

<script src="/js/menu.js"></script>
<script>
    let tipoAtual    = 'resumido';
    let periodoAtual = 'mes';
    let dadosDetalhados = [];
    let totalDetalhado  = 0;
    let paginaAtual     = 1;
    const POR_PAGINA    = 50;

    // ── Helpers de data ──────────────────────────────────────
    function hoje()           { return new Date().toISOString().slice(0,10); }
    function inicioSemana()   { const d=new Date(),day=d.getDay(); d.setDate(d.getDate()-(day===0?6:day-1)); return d.toISOString().slice(0,10); }
    function inicioMes()      { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; }
    function inicioTrimestre(){ const d=new Date(),q=Math.floor(d.getMonth()/3)*3; return `${d.getFullYear()}-${String(q+1).padStart(2,'0')}-01`; }
    function inicioAno()      { return `${new Date().getFullYear()}-01-01`; }

    function fmtData(d) {
        if (!d) return '—';
        const dt = new Date(d);
        return dt.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
    }
    function fmtBRL(v) {
        return Number(v||0).toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
    }
    function isVencido(conta) {
        if (conta.status !== 'pendente' || !conta.data) return false;
        return new Date(conta.data) < new Date(new Date().toDateString());
    }

    function fimMes() {
        const d = new Date();
        return new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().slice(0, 10);
    }
    function fimTrimestre() {
        const d = new Date(), q = Math.floor(d.getMonth() / 3) * 3 + 2;
        return new Date(d.getFullYear(), q + 1, 0).toISOString().slice(0, 10);
    }
    function fimAno() { return `${new Date().getFullYear()}-12-31`; }
    function fimSemana() {
        const d = new Date(), day = d.getDay();
        d.setDate(d.getDate() + (day === 0 ? 0 : 7 - day));
        return d.toISOString().slice(0, 10);
    }

    function setPeriodo(p, btn) {
        periodoAtual = p;
        document.querySelectorAll('.btn-periodo').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        const custom = document.getElementById('datas-custom');
        if (p === 'custom') { custom.style.display = 'grid'; return; }
        custom.style.display = 'none';
        const map = {
            hoje:      [hoje(), hoje()],
            semana:    [inicioSemana(), fimSemana()],
            mes:       [inicioMes(), fimMes()],
            trimestre: [inicioTrimestre(), fimTrimestre()],
            ano:       [inicioAno(), fimAno()]
        };
        const [di, df] = map[p] || [inicioMes(), fimMes()];
        document.getElementById('f-di').value = di;
        document.getElementById('f-df').value = df;
    }

    function setTipo(t) {
        tipoAtual = t;
        document.getElementById('btn-resumido').classList.toggle('ativo', t === 'resumido');
        document.getElementById('btn-detalhado').classList.toggle('ativo', t === 'detalhado');
    }

    // ── Carregar agendas (checkboxes) ────────────────────────
    let _todasAgendas = [];

    async function carregarAgendas() {
        const r = await fetch('/api/financeiro/agendas');
        if (!r.ok) return;
        const data = await r.json();
        _todasAgendas = data.agendas || [];

        const container = document.getElementById('f-agendas-check');
        let html = `<label class="check-todos">
            <input type="checkbox" id="chk-todas" checked onchange="toggleTodasAgendas(this.checked)"> Todas
        </label>`;
        _todasAgendas.forEach(a => {
            const label = a.nome + (a.permissao !== 'dono' ? ' (comp.)' : '');
            html += `<label><input type="checkbox" class="chk-agenda" value="${a.id}" checked onchange="onAgendaCheck()"> ${label}</label>`;
        });
        container.innerHTML = html;
    }

    function toggleTodasAgendas(checked) {
        document.querySelectorAll('.chk-agenda').forEach(c => c.checked = checked);
        carregarFiltrosGlobais();
    }

    function onAgendaCheck() {
        const checks = document.querySelectorAll('.chk-agenda');
        const todas = [...checks].every(c => c.checked);
        document.getElementById('chk-todas').checked = todas;
        carregarFiltrosGlobais();
    }

    function getAgendasSelecionadas() {
        const checks = document.querySelectorAll('.chk-agenda:checked');
        return [...checks].map(c => c.value);
    }

    async function carregarFiltrosGlobais() {
        const selCat = document.getElementById('f-categoria');
        const selEmp = document.getElementById('f-empresa');
        selCat.innerHTML = '<option value="">Todas as categorias</option>';
        selEmp.innerHTML = '<option value="">Todas as empresas</option>';
        try {
            const ids = getAgendasSelecionadas();
            const catSet = new Set();
            const empSet = new Set();
            for (const id of ids) {
                const [rC, rE] = await Promise.all([
                    fetch(`/api/financeiro/agendas/${id}/categorias`).then(r => r.json()),
                    fetch(`/api/financeiro/agendas/${id}/empresas`).then(r => r.json())
                ]);
                (rC.categorias || []).forEach(c => catSet.add(c.nome));
                (rE.empresas || []).forEach(e => empSet.add(e.nome));
            }
            [...catSet].sort().forEach(c => {
                const o = document.createElement('option');
                o.value = c; o.textContent = c;
                selCat.appendChild(o);
            });
            [...empSet].sort().forEach(e => {
                const o = document.createElement('option');
                o.value = e; o.textContent = e;
                selEmp.appendChild(o);
            });
        } catch(e) { console.error('Erro ao carregar filtros:', e); }
    }

    // ── Gerar Relatorio ──────────────────────────────────────
    async function gerarRelatorio(pg = 1) {
        const di      = document.getElementById('f-di').value;
        const df      = document.getElementById('f-df').value;
        const agIds   = getAgendasSelecionadas();
        const cat     = document.getElementById('f-categoria').value;
        const emp     = document.getElementById('f-empresa').value;
        const status  = document.getElementById('f-status').value;

        if (agIds.length === 0) {
            alert('Selecione pelo menos uma agenda.');
            return;
        }

        const params = new URLSearchParams({ tipo: tipoAtual });
        if (di)     params.set('dataInicio', di);
        if (df)     params.set('dataFim',    df);
        params.set('agenda_ids', agIds.join(','));
        if (cat)    params.set('categoria',  cat);
        if (emp)    params.set('empresa',    emp);
        if (status) params.set('status',     status);
        if (tipoAtual === 'detalhado') params.set('page', pg);

        const res = document.getElementById('resultado');
        res.style.display = 'block';
        res.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';

        const btn = document.getElementById('btn-gerar');
        btn.disabled = true;

        try {
            const r    = await fetch('/api/financeiro/relatorios?' + params.toString());
            const data = await r.json();
            if (!r.ok) throw new Error(data.erro || 'Erro desconhecido');

            paginaAtual = pg;
            if (tipoAtual === 'resumido') {
                renderResumo(data, di, df);
            } else {
                totalDetalhado  = data.total;
                dadosDetalhados = data.contas;
                renderDetalhado(data, di, df);
            }
        } catch (e) {
            res.innerHTML = `<div class="sem-dados"><i class="fas fa-exclamation-circle"></i> ${e.message}</div>`;
        } finally {
            btn.disabled = false;
        }
    }

    // ── Render Resumido ──────────────────────────────────────
    function renderResumo(data, di, df) {
        const r = data.resumo;
        const periodo = di && df ? `${fmtData(di)} — ${fmtData(df)}` : 'Periodo selecionado';

        let html = `
        <div class="resultado-header">
            <h2>Resumo Financeiro</h2>
            <span><i class="fas fa-calendar-alt"></i> ${periodo}</span>
        </div>

        <div class="cards-grid">
            <div class="card-stat c-total">
                <div class="val">${r.total}</div>
                <div class="lbl">Total de Lancamentos</div>
            </div>
            <div class="card-stat c-valor">
                <div class="val val-brl">${fmtBRL(r.total_valor)}</div>
                <div class="lbl">Valor Total</div>
            </div>
            <div class="card-stat c-pend">
                <div class="val">${r.pendentes}</div>
                <div class="lbl">Pendentes</div>
            </div>
            <div class="card-stat c-pend">
                <div class="val val-brl">${fmtBRL(r.valor_pendente)}</div>
                <div class="lbl">Valor Pendente</div>
            </div>
            <div class="card-stat c-pago">
                <div class="val">${r.pagos}</div>
                <div class="lbl">Pagos</div>
            </div>
            <div class="card-stat c-pago">
                <div class="val val-brl">${fmtBRL(r.valor_pago)}</div>
                <div class="lbl">Valor Pago</div>
            </div>
            <div class="card-stat c-venc">
                <div class="val">${r.vencidos}</div>
                <div class="lbl">Vencidos</div>
            </div>
            <div class="card-stat c-venc">
                <div class="val val-brl">${fmtBRL(r.valor_vencido)}</div>
                <div class="lbl">Valor Vencido</div>
            </div>
        </div>`;

        // Graficos lado a lado
        html += '<div class="secao-grid">';

        // Por Categoria
        html += '<div class="secao"><h3><i class="fas fa-tag"></i> Por Categoria</h3>';
        if (data.por_categoria.length === 0) {
            html += '<div class="sem-dados">Nenhum dado</div>';
        } else {
            const maxCat = Math.max(...data.por_categoria.map(c => Number(c.valor)));
            html += '<div class="bar-chart">';
            data.por_categoria.forEach(c => {
                const pct = maxCat > 0 ? (Number(c.valor) / maxCat * 100).toFixed(1) : 0;
                html += `
                <div class="bar-row">
                    <div class="bar-label" title="${c.categoria}">${c.categoria || 'Geral'}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
                    <div class="bar-count">${fmtBRL(c.valor)}</div>
                </div>`;
            });
            html += '</div>';
        }
        html += '</div>';

        // Por Empresa
        html += '<div class="secao"><h3><i class="fas fa-building"></i> Por Empresa</h3>';
        if (data.por_empresa.length === 0) {
            html += '<div class="sem-dados">Nenhuma empresa vinculada</div>';
        } else {
            const maxEmp = Math.max(...data.por_empresa.map(e => Number(e.valor)));
            html += '<div class="bar-chart">';
            data.por_empresa.forEach(e => {
                const pct = maxEmp > 0 ? (Number(e.valor) / maxEmp * 100).toFixed(1) : 0;
                html += `
                <div class="bar-row">
                    <div class="bar-label" title="${e.empresa}">${e.empresa}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
                    <div class="bar-count">${fmtBRL(e.valor)}</div>
                </div>`;
            });
            html += '</div>';
        }
        html += '</div>';

        html += '</div>'; // fim secao-grid

        // Tabela resumo por categoria
        if (data.por_categoria.length > 0) {
            html += `
            <div class="secao">
                <h3><i class="fas fa-table"></i> Detalhamento por Categoria</h3>
                <div class="tbl-wrap">
                    <table>
                        <thead><tr>
                            <th>Categoria</th>
                            <th class="td-num">Lancamentos</th>
                            <th class="td-num">Valor Total</th>
                            <th class="td-num">% do Total</th>
                        </tr></thead>
                        <tbody>`;
            const totalVal = Number(r.total_valor) || 1;
            data.por_categoria.forEach(c => {
                const pct = (Number(c.valor) / totalVal * 100).toFixed(1);
                html += `<tr>
                    <td>${c.categoria || 'Geral'}</td>
                    <td class="td-num">${c.total}</td>
                    <td class="td-num">${fmtBRL(c.valor)}</td>
                    <td class="td-num">${pct}%</td>
                </tr>`;
            });
            html += '</tbody></table></div></div>';
        }

        document.getElementById('resultado').innerHTML = html;
    }

    // ── Render Detalhado ──────────────────────────────────────
    let _detContasFull = []; // armazena todas as contas da página para filtro local

    function renderDetalhado(data, di, df) {
        const periodo = di && df ? `${fmtData(di)} — ${fmtData(df)}` : 'Periodo selecionado';
        const totalPgs = Math.ceil(data.total / POR_PAGINA);
        _detContasFull = data.contas;

        let html = `
        <div class="resultado-header">
            <h2>Relatorio Detalhado</h2>
            <span><i class="fas fa-calendar-alt"></i> ${periodo} &nbsp;|&nbsp; ${data.total} lancamentos</span>
            <button class="btn-exportar" onclick="exportarCSV()"><i class="fas fa-download"></i> Exportar CSV</button>
        </div>`;

        if (data.contas.length === 0) {
            html += '<div class="sem-dados"><i class="fas fa-inbox"></i> Nenhum lancamento encontrado para os filtros selecionados.</div>';
            document.getElementById('resultado').innerHTML = html;
            return;
        }

        html += `
        <div class="secao">
            <div class="tbl-wrap">
                <table id="tbl-detalhado">
                    <thead>
                        <tr>
                            <th class="th-sort" onclick="ordenarTabela('agenda_nome')">Agenda <i class="fas fa-sort"></i></th>
                            <th class="th-sort" onclick="ordenarTabela('descricao')">Descricao <i class="fas fa-sort"></i></th>
                            <th class="td-num th-sort" onclick="ordenarTabela('valor')">Valor <i class="fas fa-sort"></i></th>
                            <th class="th-sort" onclick="ordenarTabela('data')">Data <i class="fas fa-sort"></i></th>
                            <th class="th-sort" onclick="ordenarTabela('categoria')">Categoria <i class="fas fa-sort"></i></th>
                            <th class="th-sort" onclick="ordenarTabela('empresa')">Empresa <i class="fas fa-sort"></i></th>
                            <th class="th-sort" onclick="ordenarTabela('frequencia')">Frequencia <i class="fas fa-sort"></i></th>
                            <th class="td-center th-sort" onclick="ordenarTabela('status')">Status <i class="fas fa-sort"></i></th>
                            <th class="th-sort" onclick="ordenarTabela('criado_por')">Criado Por <i class="fas fa-sort"></i></th>
                        </tr>
                        <tr class="filtros-tabela">
                            <th><input type="text" placeholder="Filtrar..." onkeyup="filtrarTabela()" id="ft-agenda"></th>
                            <th><input type="text" placeholder="Filtrar..." onkeyup="filtrarTabela()" id="ft-descricao"></th>
                            <th></th>
                            <th></th>
                            <th><input type="text" placeholder="Filtrar..." onkeyup="filtrarTabela()" id="ft-categoria"></th>
                            <th><input type="text" placeholder="Filtrar..." onkeyup="filtrarTabela()" id="ft-empresa"></th>
                            <th></th>
                            <th><select onchange="filtrarTabela()" id="ft-status">
                                <option value="">Todos</option>
                                <option value="pago">Pago</option>
                                <option value="pendente">Pendente</option>
                                <option value="vencido">Vencido</option>
                            </select></th>
                            <th><input type="text" placeholder="Filtrar..." onkeyup="filtrarTabela()" id="ft-criado"></th>
                        </tr>
                    </thead>
                    <tbody id="tbody-detalhado">`;

        html += renderLinhasDetalhado(data.contas);

        html += `</tbody></table></div>
            <div class="paginacao">
                <span>Pagina ${paginaAtual} de ${totalPgs} &nbsp;(${data.total} registros)</span>
                <div class="pag-btns">
                    <button class="btn-pag" onclick="gerarRelatorio(${paginaAtual-1})" ${paginaAtual<=1?'disabled':''}>
                        <i class="fas fa-chevron-left"></i> Anterior
                    </button>
                    <button class="btn-pag" onclick="gerarRelatorio(${paginaAtual+1})" ${paginaAtual>=totalPgs?'disabled':''}>
                        Proxima <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>`;

        document.getElementById('resultado').innerHTML = html;
    }

    function renderLinhasDetalhado(contas) {
        let html = '';
        contas.forEach(c => {
            const vencido = isVencido(c);
            const badgeClass = c.status === 'pago' ? 'b-pago' : (vencido ? 'b-venc' : 'b-pend');
            const badgeLabel = c.status === 'pago' ? 'Pago' : (vencido ? 'Vencido' : 'Pendente');
            html += `<tr>
                <td>${c.agenda_nome || '—'}</td>
                <td>${c.descricao}</td>
                <td class="td-num">${fmtBRL(c.valor)}</td>
                <td>${fmtData(c.data)}</td>
                <td>${c.categoria || '—'}</td>
                <td>${c.empresa || '—'}</td>
                <td>${c.frequencia || '—'}</td>
                <td class="td-center"><span class="badge ${badgeClass}">${badgeLabel}</span></td>
                <td>${c.criado_por || '—'}</td>
            </tr>`;
        });
        return html;
    }

    let _sortCol = '';
    let _sortDir = 'asc';

    function ordenarTabela(col) {
        if (_sortCol === col) {
            _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            _sortCol = col;
            _sortDir = 'asc';
        }

        // Atualizar ícones
        document.querySelectorAll('.th-sort').forEach(th => {
            th.classList.remove('asc', 'desc');
            const icon = th.querySelector('i');
            if (icon) icon.className = 'fas fa-sort';
        });
        const headers = document.querySelectorAll('.th-sort');
        headers.forEach(th => {
            if (th.textContent.trim().toLowerCase().startsWith(col === 'agenda_nome' ? 'agenda' : col.replace('_', ' '))) {
                th.classList.add(_sortDir);
                const icon = th.querySelector('i');
                if (icon) icon.className = _sortDir === 'asc' ? 'fas fa-sort-up' : 'fas fa-sort-down';
            }
        });

        _detContasFull.sort((a, b) => {
            let vA = a[col], vB = b[col];
            if (col === 'valor') {
                vA = Number(vA || 0); vB = Number(vB || 0);
            } else if (col === 'data') {
                vA = new Date(vA || 0).getTime(); vB = new Date(vB || 0).getTime();
            } else {
                vA = (vA || '').toString().toLowerCase();
                vB = (vB || '').toString().toLowerCase();
            }
            if (vA < vB) return _sortDir === 'asc' ? -1 : 1;
            if (vA > vB) return _sortDir === 'asc' ? 1 : -1;
            return 0;
        });

        filtrarTabela();
    }

    function filtrarTabela() {
        const fAgenda    = (document.getElementById('ft-agenda')?.value || '').toLowerCase();
        const fDescricao = (document.getElementById('ft-descricao')?.value || '').toLowerCase();
        const fCategoria = (document.getElementById('ft-categoria')?.value || '').toLowerCase();
        const fEmpresa   = (document.getElementById('ft-empresa')?.value || '').toLowerCase();
        const fStatus    = (document.getElementById('ft-status')?.value || '').toLowerCase();
        const fCriado    = (document.getElementById('ft-criado')?.value || '').toLowerCase();

        const filtradas = _detContasFull.filter(c => {
            if (fAgenda    && !(c.agenda_nome || '').toLowerCase().includes(fAgenda)) return false;
            if (fDescricao && !(c.descricao || '').toLowerCase().includes(fDescricao)) return false;
            if (fCategoria && !(c.categoria || '').toLowerCase().includes(fCategoria)) return false;
            if (fEmpresa   && !(c.empresa || '').toLowerCase().includes(fEmpresa)) return false;
            if (fCriado    && !(c.criado_por || '').toLowerCase().includes(fCriado)) return false;
            if (fStatus) {
                const vencido = isVencido(c);
                const statusLabel = c.status === 'pago' ? 'pago' : (vencido ? 'vencido' : 'pendente');
                if (statusLabel !== fStatus) return false;
            }
            return true;
        });

        const tbody = document.getElementById('tbody-detalhado');
        if (tbody) tbody.innerHTML = renderLinhasDetalhado(filtradas);
    }

    // ── Exportar CSV ──────────────────────────────────────────
    async function exportarCSV() {
        // Busca todos os dados sem paginacao
        const di      = document.getElementById('f-di').value;
        const df      = document.getElementById('f-df').value;
        const agIds   = getAgendasSelecionadas();
        const cat     = document.getElementById('f-categoria').value;
        const emp     = document.getElementById('f-empresa').value;
        const status  = document.getElementById('f-status').value;

        // Pagina 1 com limite grande (busca ate 5000 registros)
        let todos = [];
        let pg = 1;
        while (true) {
            const params = new URLSearchParams({ tipo:'detalhado', page: pg });
            if (di)    params.set('dataInicio', di);
            if (df)    params.set('dataFim', df);
            params.set('agenda_ids', agIds.join(','));
            if (cat)   params.set('categoria', cat);
            if (emp)   params.set('empresa', emp);
            if (status) params.set('status', status);
            const r = await fetch('/api/financeiro/relatorios?' + params.toString());
            const d = await r.json();
            todos = todos.concat(d.contas || []);
            if (todos.length >= d.total || pg * 50 >= d.total) break;
            pg++;
            if (pg > 100) break; // seguranca: max 5000
        }

        const BOM = '\uFEFF';
        const header = ['ID','Agenda','Descricao','Valor','Data','Categoria','Empresa','Frequencia','Status','Criado Por','Criado Em'];
        const rows = todos.map(c => [
            c.id,
            `"${(c.agenda_nome||'').replace(/"/g,'""')}"`,
            `"${(c.descricao||'').replace(/"/g,'""')}"`,
            String(c.valor||0).replace('.',','),
            fmtData(c.data),
            `"${(c.categoria||'').replace(/"/g,'""')}"`,
            `"${(c.empresa||'').replace(/"/g,'""')}"`,
            c.frequencia||'',
            c.status||'',
            c.criado_por||'',
            c.criado_em ? new Date(c.criado_em).toLocaleString('pt-BR') : ''
        ].join(';'));

        const csv = BOM + [header.join(';'), ...rows].join('\n');
        const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        const nomePeriodo = di && df ? `${di}_${df}` : 'todos';
        a.download = `relatorio_financeiro_${nomePeriodo}.csv`;
        a.click();
        URL.revokeObjectURL(url);
    }

    // ── Init ─────────────────────────────────────────────────
    setPeriodo('mes', document.querySelector('.btn-periodo.ativo'));
    carregarAgendas().then(() => carregarFiltrosGlobais());
</script>
