      <button class="wpp-aba-btn ${i === 0 ? 'ativa' : ''}" data-painel="${s.id}">

      </button>

    paineis.innerHTML = SISTEMAS.map((s, i) => `
      <div class="wpp-painel ${i === 0 ? 'ativo' : ''}" id="wpp-painel-${s.id}">
        ${s.id === 'configuracao'
          ? renderPainelConfiguracao()
          : (s.id === 'mensagens' ? renderPainelMensagens() : renderPainelModulo(s))}
      </div>
    `).join('');

    abas.querySelectorAll('.wpp-aba-btn').forEach((btn) => {
      btn.addEventListener('click', function () {
        abas.querySelectorAll('.wpp-aba-btn').forEach((b) => b.classList.remove('ativa'));
        document.querySelectorAll('.wpp-painel').forEach((p) => p.classList.remove('ativo'));
        btn.classList.add('ativa');
        document.getElementById(`wpp-painel-${btn.dataset.painel}`).classList.add('ativo');
      });
    });

    document.querySelectorAll('.wpp-dest-chip').forEach((chip) => {
      chip.addEventListener('click', function () {
        chip.classList.toggle('ativo');
      });
    });

    document.querySelectorAll('.wpp-sel-todos').forEach((btn) => {
      btn.addEventListener('click', function () {
        const sistemaId = btn.dataset.sistema;
        const sistema = SISTEMAS.find((item) => item.id === sistemaId);
        if (!sistema) return;
        const secao = (sistema.secoes || []).find((item) => item.titulo === btn.dataset.secao);
        if (!secao) return;
        secao.eventos.forEach((evento) => {
          const checkbox = document.getElementById(`wpp-${sistemaId}-${evento.id}`);
          if (checkbox) checkbox.checked = true;
        });
      });
    });
  }

  function renderEditorMensagens() {
    const wrapSistemas = document.getElementById('wpp-msg-sistemas');
    const wrapLista = document.getElementById('wpp-msg-lista');
    const titulo = document.getElementById('wpp-msg-sistema-titulo');
    if (!wrapSistemas || !wrapLista || !titulo) return;

    const sistemas = getSistemasMensagens();
    if (!sistemas.length) {
      wrapSistemas.innerHTML = '';
      wrapLista.innerHTML = '<div class="sem-dados">Nenhuma mensagem cadastrada.</div>';
      return;
    }

    if (!sistemas.some((item) => item.id === sistemaMensagensAtivo)) {
      sistemaMensagensAtivo = sistemas[0].id;
    }

    wrapSistemas.innerHTML = sistemas.map((item) => `

    wrapSistemas.querySelectorAll('[data-sistema-msg]').forEach((btn) => {
      btn.addEventListener('click', function () {
        sistemaMensagensAtivo = btn.dataset.sistemaMsg;
        renderEditorMensagens();
      });
    });

    const templatesSistema = whatsappTemplates.filter((item) => item.sistema === sistemaMensagensAtivo);
    titulo.textContent = `Mensagens - ${SISTEMA_MSG_META[sistemaMensagensAtivo]?.label || sistemaMensagensAtivo}`;

    wrapLista.innerHTML = templatesSistema.map((item) => {
      const valorAtual = normalizarTemplateValor(item.valorSalvo || item.template || '');
      return `
        <div class="wpp-msg-card">
          <h4>${esc(item.titulo)}</h4>
          <p>${esc(item.descricao || '')}</p>

            <button class="wpp-btn-link" type="button" data-reset-template="${esc(item.key)}">Restaurar padrao</button>
            <span class="wpp-msg-status" id="wpp-template-status-${esc(item.key)}"></span>
          </div>
        </div>
      `;
    }).join('');

    wrapLista.querySelectorAll('[data-reset-template]').forEach((btn) => {
      btn.addEventListener('click', function () {
        const key = btn.dataset.resetTemplate;
        const item = whatsappTemplates.find((tpl) => tpl.key === key);

        <span id="wpp-msg-editor-status" class="wpp-msg-status"></span>

  function preencherTela() {
    const setVal = (id, valor, padrao) => {
      const el = document.getElementById(id);
      if (el) el.value = valor || padrao || '';
    };
    const setChk = (id, chave, padrao) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.checked = boolConfig(chave, padrao);
    };

    setChk('whatsapp-ativo', 'whatsapp_ativo', true);
    setVal('whatsapp-url', config.whatsapp_url, 'http://localhost:3200');
    setVal('whatsapp-api-key', config.whatsapp_api_key, '');
    setVal('whatsapp-numero-teste', config.whatsapp_numero_teste, '');
    setVal('whatsapp-delay-ms', config.whatsapp_delay_ms, '4000');
    setVal('whatsapp-mensagem-teste', config.whatsapp_mensagem_teste, 'Portal WKL - teste de integracao WhatsApp.');
    setBadge('whatsapp-ativo', 'estado-whatsapp-ativo');

    SISTEMAS.filter((s) => !['configuracao', 'mensagens'].includes(s.id)).forEach((sistema) => {
      const moduloAtivoPadrao = sistema.id === 'aprovacoes';
      setChk(`wpp-${sistema.id}-ativo`, `wpp.${sistema.id}.ativo`, moduloAtivoPadrao);
      setBadge(`wpp-${sistema.id}-ativo`, `estado-wpp-${sistema.id}-ativo`);

      (sistema.secoes || []).forEach((secao) => {
        secao.eventos.forEach((evento) => {
          const chaveEvento = `wpp.${sistema.id}.${evento.id}`;
          const padraoEvento = sistema.id === 'aprovacoes' && ['nova_solicitacao', 'lembrete_pendente'].includes(evento.id);
          setChk(`wpp-${sistema.id}-${evento.id}`, chaveEvento, padraoEvento);

          const destKey = `wpp.dest.${sistema.id}.${evento.id}`;
          const destAtivos = listConfig(destKey, evento.chips || []);
          document.querySelectorAll(`.wpp-dest-chip[data-dest="${sistema.id}.${evento.id}"]`).forEach((chip) => {
            chip.classList.toggle('ativo', destAtivos.includes(chip.dataset.tipo));
          });
        });
      });
    });
  }

      const data = await resp.json();
      config = data.config || {};
      preencherTela();

  function alerta(id, msg, tipo) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = `alerta alerta-${tipo} visivel`;
    el.textContent = msg;
    setTimeout(() => el.classList.remove('visivel'), 5000);

  window.wppBadge = setBadge;

  window.wppSalvarConfiguracao = async function () {
    const delayMs = Math.max(1000, parseInt(document.getElementById('whatsapp-delay-ms').value || '4000', 10) || 4000);
    const configuracoes = {
      whatsapp_ativo: String(document.getElementById('whatsapp-ativo').checked),
      whatsapp_url: document.getElementById('whatsapp-url').value.trim(),
      whatsapp_api_key: document.getElementById('whatsapp-api-key').value.trim(),
      whatsapp_numero_teste: document.getElementById('whatsapp-numero-teste').value.replace(/\D/g, '').slice(0, 20),
      whatsapp_delay_ms: String(delayMs),
      whatsapp_mensagem_teste: document.getElementById('whatsapp-mensagem-teste').value.trim(),
    };

    document.getElementById('whatsapp-delay-ms').value = String(delayMs);

    try {
      const resp = await fetch('/api/configuracoes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ grupo: 'whatsapp', configuracoes }),
      });
      const data = await resp.json();
      alerta('alerta-whatsapp', data.mensagem || data.erro, resp.ok ? 'sucesso' : 'erro');
      if (resp.ok) config = { ...config, ...configuracoes };
    } catch (_) {
      alerta('alerta-whatsapp', 'Erro de comunicacao ao salvar configuracao.', 'erro');
    }
  };

  window.wppSalvarModulo = async function (sistemaId) {
    const sistema = SISTEMAS.find((item) => item.id === sistemaId);
    if (!sistema) return;

    const configuracoes = {
      [`wpp.${sistemaId}.ativo`]: String(document.getElementById(`wpp-${sistemaId}-ativo`).checked),
    };

    (sistema.secoes || []).forEach((secao) => {
      secao.eventos.forEach((evento) => {
        const eventKey = `${sistemaId}.${evento.id}`;
        configuracoes[`wpp.${eventKey}`] = String(document.getElementById(`wpp-${sistemaId}-${evento.id}`).checked);
        const dest = Array.from(document.querySelectorAll(`.wpp-dest-chip.ativo[data-dest="${eventKey}"]`))
          .map((chip) => chip.dataset.tipo);
        configuracoes[`wpp.dest.${eventKey}`] = dest.join(',');
      });
    });

    try {
      const resp = await fetch('/api/configuracoes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ grupo: 'whatsapp', configuracoes }),
      });
      const data = await resp.json();
      const msgEl = document.getElementById(`wpp-msg-${sistemaId}`);
      if (msgEl) {
        msgEl.style.color = resp.ok ? '#4caf50' : '#f44336';
        msgEl.textContent = resp.ok ? 'Salvo!' : (data.erro || 'Erro ao salvar.');
        setTimeout(() => { msgEl.textContent = ''; }, 3000);
      }
      if (resp.ok) config = { ...config, ...configuracoes };
    } catch (_) {
      const msgEl = document.getElementById(`wpp-msg-${sistemaId}`);
      if (msgEl) {
        msgEl.style.color = '#f44336';
        msgEl.textContent = 'Erro de conexao.';
      }
    }
  };

  window.wppSalvarMensagensSistema = async function () {
    const templatesSistema = whatsappTemplates.filter((item) => item.sistema === sistemaMensagensAtivo);
    const configuracoes = {};

    templatesSistema.forEach((item) => {
      const textarea = document.getElementById(`wpp-template-${item.key}`);
      if (!textarea) return;
      const valor = normalizarTemplateValor(textarea.value).trim();
      configuracoes[`wpp.msg.${item.key}`] = valor;
    });

    try {
      const resp = await fetch('/api/configuracoes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ grupo: 'whatsapp', configuracoes }),
      });
      const data = await resp.json();
      const statusEl = document.getElementById('wpp-msg-editor-status');
      if (statusEl) {
        statusEl.style.color = resp.ok ? '#4caf50' : '#f44336';
        statusEl.textContent = resp.ok ? 'Mensagens salvas.' : (data.erro || 'Erro ao salvar.');
        setTimeout(() => { statusEl.textContent = ''; }, 3500);
      }

      if (resp.ok) {
        whatsappTemplates = whatsappTemplates.map((item) => ({
          ...item,
          valorSalvo: Object.prototype.hasOwnProperty.call(configuracoes, `wpp.msg.${item.key}`)
            ? configuracoes[`wpp.msg.${item.key}`]
            : item.valorSalvo,
        }));
        config = { ...config, ...configuracoes };
      }
    } catch (_) {
      const statusEl = document.getElementById('wpp-msg-editor-status');
      if (statusEl) {
        statusEl.style.color = '#f44336';
        statusEl.textContent = 'Erro de conexao.';
      }
    }
  };

  window.wppTestar = async function () {
    const numero = document.getElementById('whatsapp-numero-teste').value.replace(/\D/g, '').slice(0, 20);
    const mensagem = document.getElementById('whatsapp-mensagem-teste').value.trim() || 'Portal WKL - teste de integracao WhatsApp.';

    if (!numero) {
      alerta('alerta-whatsapp', 'Informe um numero de teste antes de enviar.', 'erro');
      return;
    }

    try {
      const resp = await fetch('/api/whatsapp/testar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ numero, mensagem }),
      });
      const data = await resp.json();
      alerta('alerta-whatsapp', data.mensagem || data.erro, resp.ok ? 'sucesso' : 'erro');
    } catch (_) {
      alerta('alerta-whatsapp', 'Erro de comunicacao ao enviar o teste.', 'erro');
    }
  };

  renderAbas();
  carregarConfiguracao();
  carregarUsuariosWhatsApp();
  carregarTemplatesWhatsApp();
})();
</script>
