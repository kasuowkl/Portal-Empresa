<!-- FRAGMENTO: Logs -->
<style>
.logs-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:14px; }
.logs-header h3 { margin:0; font-size:1.1rem; display:flex; align-items:center; gap:8px; }
.logs-header-btns { display:flex; gap:8px; }

.logs-filtros {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
  background: var(--cor-fundo-2);
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid var(--cor-borda);
}
.logs-filtros input,
.logs-filtros select {
  background: var(--cor-fundo-3);
  border: 1px solid var(--cor-borda);
  color: var(--cor-texto);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: .85rem;
  height: 34px;
}
.logs-filtros input:focus,
.logs-filtros select:focus { outline: none; border-color: var(--cor-destaque); }
.logs-filtros .filtro-usuario  { width: 140px; }
.logs-filtros .filtro-texto    { flex: 1; min-width: 180px; }
.logs-filtros .filtro-acao     { width: 140px; }
.logs-filtros .filtro-sistema  { width: 150px; }
.logs-filtros .filtro-data     { width: 140px; }

.logs-info-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: .8rem;
  color: var(--cor-texto-fraco);
  margin-bottom: 8px;
  flex-wrap: wrap;
  gap: 6px;
}
.logs-paginacao { display:flex; gap:6px; align-items:center; }
.logs-paginacao button {
  background: var(--cor-fundo-3);
  border: 1px solid var(--cor-borda);
  color: var(--cor-texto);
  border-radius: 5px;
  padding: 3px 10px;
  cursor: pointer;
  font-size: .8rem;
}
.logs-paginacao button:disabled { opacity: .4; cursor: default; }
.logs-paginacao button:hover:not(:disabled) { border-color: var(--cor-destaque); }

.log-item {
  display: grid;
  grid-template-columns: 160px 110px 80px auto 1fr 120px;
  align-items: center;
  gap: 0 12px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--cor-borda);
  font-size: .83rem;
  transition: background .15s;
}
.log-item:hover { background: var(--cor-fundo-2); }
.log-item:last-child { border-bottom: none; }

.log-hora   { color: var(--cor-texto-fraco); white-space: nowrap; font-size: .78rem; }
.log-usuario { color: var(--cor-destaque); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.log-acao-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px;
  font-size: .72rem; font-weight: 600; white-space: nowrap;
}
.log-acao-badge.LOGIN    { background:#1a3a2a; color:#4caf50; }
.log-acao-badge.LOGOUT   { background:#2a2a1a; color:#ffb300; }
.log-acao-badge.CRIACAO  { background:#1a2a3a; color:#4e9af1; }
.log-acao-badge.EDICAO   { background:#2a1a3a; color:#ab5cf7; }
.log-acao-badge.EXCLUSAO { background:#3a1a1a; color:#e94560; }
.log-acao-badge.ACESSO   { background:#1a2a2a; color:#78d6c8; }

.log-sistema-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px;
  font-size: .72rem; background: var(--cor-fundo-3); color: var(--cor-texto-fraco);
  white-space: nowrap;
}
.log-sistema-badge.portal     { color: #4e9af1; }
.log-sistema-badge.chamados   { color: #e94560; }
.log-sistema-badge.financeiro { color: #4caf50; }
.log-sistema-badge.patrimonio { color: #ff9800; }
.log-sistema-badge.agenda     { color: #ab5cf7; }
.log-sistema-badge.contatos   { color: #78d6c8; }

.log-detalhes { color: var(--cor-texto); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.log-ip       { color: var(--cor-texto-fraco); font-size: .72rem; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.log-lista-wrap {
  background: var(--cor-fundo-2);
  border: 1px solid var(--cor-borda);
  border-radius: 8px;
  overflow: hidden;
}
.log-lista-header {
  display: grid;
  grid-template-columns: 160px 110px 80px auto 1fr 120px;
  gap: 0 12px;
  padding: 8px 12px;
  background: var(--cor-fundo-3);
  font-size: .75rem;
  color: var(--cor-texto-fraco);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
  border-bottom: 1px solid var(--cor-borda);
}
</style>

<div class="logs-header">
  <h3><i class="fas fa-clipboard-list" style="color:var(--cor-destaque)"></i> Logs de Atividade</h3>
  <div class="logs-header-btns">
    <button class="btn btn-sm" onclick="carregarLogs(1)" style="width:auto;background:var(--cor-fundo-3);color:var(--cor-texto);border:1px solid var(--cor-borda)">
      <i class="fas fa-sync-alt"></i> Atualizar
    </button>
  </div>
</div>

<!-- Filtros -->
<div class="logs-filtros">
  <input class="filtro-usuario" type="text"  id="filtro-usuario"  placeholder="Usuário..."    title="Filtrar por usuário"  oninput="debounceLog()">
  <input class="filtro-texto"   type="text"  id="filtro-texto"    placeholder="Buscar nos detalhes..." title="Buscar nos detalhes" oninput="debounceLog()">
  <select class="filtro-acao"   id="filtro-acao"   onchange="carregarLogs(1)">
    <option value="todos">Todas as ações</option>
    <option value="LOGIN">Login</option>
    <option value="LOGOUT">Logout</option>
    <option value="CRIACAO">Criação</option>
    <option value="EDICAO">Edição</option>
    <option value="EXCLUSAO">Exclusão</option>
  </select>
  <select class="filtro-sistema" id="filtro-sistema" onchange="carregarLogs(1)">
    <option value="todos">Todos os sistemas</option>
    <option value="portal">🔑 Portal</option>
    <option value="chamados">🎫 Chamados</option>
    <option value="financeiro">💰 Financeiro</option>
    <option value="patrimonio">📦 Patrimônio</option>
    <option value="agenda">✅ Ag. Tarefas</option>
    <option value="contatos">📒 Contatos</option>
  </select>
  <input class="filtro-data" type="date" id="filtro-de"  onchange="carregarLogs(1)" title="Data inicial">
  <input class="filtro-data" type="date" id="filtro-ate" onchange="carregarLogs(1)" title="Data final">
  <button onclick="limparFiltros()" style="width:auto;background:transparent;color:var(--cor-texto-fraco);border:1px solid var(--cor-borda);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:.83rem">
    <i class="fas fa-times"></i> Limpar
  </button>
</div>

<!-- Info bar -->
<div class="logs-info-bar">
  <span id="logs-total-info" style="color:var(--cor-texto-fraco)"></span>
  <div class="logs-paginacao">
    <button id="btn-pag-ant" onclick="mudarPagina(-1)" disabled><i class="fas fa-chevron-left"></i> Anterior</button>
    <span id="logs-pag-info"></span>
    <button id="btn-pag-prox" onclick="mudarPagina(1)" disabled>Próxima <i class="fas fa-chevron-right"></i></button>
  </div>
</div>

<!-- Lista -->
<div class="log-lista-wrap">
  <div class="log-lista-header">
    <span>Data / Hora</span><span>Usuário</span><span>Ação</span><span>Sistema</span><span>Detalhes</span><span style="text-align:right">IP</span>
  </div>
  <div id="lista-logs">
    <div style="text-align:center;padding:24px;color:var(--cor-texto-fraco)">
      <i class="fas fa-spinner fa-spin"></i> Carregando logs...
    </div>
  </div>
</div>

<script>
(function () {
  const ICONES_SISTEMA = {
    portal: '<i class="fas fa-key"></i>',
    chamados: '<i class="fas fa-ticket-alt"></i>',
    financeiro: '<i class="fas fa-dollar-sign"></i>',
    patrimonio: '<i class="fas fa-boxes"></i>',
    agenda: '<i class="fas fa-check-square"></i>',
    contatos: '<i class="fas fa-address-book"></i>',
  };
  const ICONES_ACAO = {
    LOGIN:    '<i class="fas fa-sign-in-alt"></i>',
    LOGOUT:   '<i class="fas fa-sign-out-alt"></i>',
    CRIACAO:  '<i class="fas fa-plus-circle"></i>',
    EDICAO:   '<i class="fas fa-edit"></i>',
    EXCLUSAO: '<i class="fas fa-trash-alt"></i>',
    ACESSO:   '<i class="fas fa-eye"></i>',
  };

  let paginaAtual = 1;
  let totalPaginas = 1;
  let debounceTimer = null;

  window.debounceLog = function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => carregarLogs(1), 450);
  };

  window.mudarPagina = function (delta) {
    const nova = paginaAtual + delta;
    if (nova >= 1 && nova <= totalPaginas) carregarLogs(nova);
  };

  window.carregarLogs = async function (pagina) {
    paginaAtual = pagina || paginaAtual;
    const lista   = document.getElementById('lista-logs');
    const usuario = document.getElementById('filtro-usuario').value.trim();
    const texto   = document.getElementById('filtro-texto').value.trim();
    const acao    = document.getElementById('filtro-acao').value;
    const sistema = document.getElementById('filtro-sistema').value;
    const de      = document.getElementById('filtro-de').value;
    const ate     = document.getElementById('filtro-ate').value;

    const params = new URLSearchParams({ pagina: paginaAtual });
    if (usuario) params.set('usuario', usuario);
    if (texto)   params.set('texto', texto);
    if (acao && acao !== 'todos')    params.set('acao', acao);
    if (sistema && sistema !== 'todos') params.set('sistema', sistema);
    if (de)  params.set('de', de);
    if (ate) params.set('ate', ate);

    lista.innerHTML = '<div style="text-align:center;padding:24px;color:var(--cor-texto-fraco)"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>';

    try {
      const resp  = await fetch('/api/logs?' + params.toString());
      if (resp.status === 401) { window.location.href = '/login.html'; return; }
      const dados = await resp.json();

      // Paginação
      const por = dados.porPagina || 100;
      totalPaginas = Math.max(1, Math.ceil((dados.total || 0) / por));
      const info = document.getElementById('logs-total-info');
      const pgInfo = document.getElementById('logs-pag-info');
      info.textContent = dados.total
        ? `${dados.total} registro(s) encontrado(s)`
        : 'Nenhum registro encontrado';
      pgInfo.textContent = `Página ${paginaAtual} de ${totalPaginas}`;
      document.getElementById('btn-pag-ant').disabled  = paginaAtual <= 1;
      document.getElementById('btn-pag-prox').disabled = paginaAtual >= totalPaginas;

      if (!dados.logs || dados.logs.length === 0) {
        lista.innerHTML = '<div class="sem-dados" style="padding:32px;text-align:center;color:var(--cor-texto-fraco)"><i class="fas fa-clipboard-list" style="font-size:2rem;margin-bottom:8px;display:block"></i>Nenhum log encontrado com os filtros aplicados.</div>';
        return;
      }

      lista.innerHTML = dados.logs.map(log => {
        const dt     = new Date(log.data_hora);
        const hora   = dt.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
        const sis    = (log.sistema || 'portal').toLowerCase();
        const acao   = (log.acao || '').toUpperCase();
        const icSis  = ICONES_SISTEMA[sis] || '<i class="fas fa-circle"></i>';
        const icAcao = ICONES_ACAO[acao]   || '<i class="fas fa-dot-circle"></i>';
        const nomeSis = { portal:'Portal', chamados:'Chamados', financeiro:'Financeiro', patrimonio:'Patrimônio', agenda:'Ag. Tarefas', contatos:'Contatos' }[sis] || sis;
        const nomeAcao = { LOGIN:'Login', LOGOUT:'Logout', CRIACAO:'Criação', EDICAO:'Edição', EXCLUSAO:'Exclusão', ACESSO:'Acesso' }[acao] || acao;
        return `
          <div class="log-item">
            <span class="log-hora">${hora}</span>
            <span class="log-usuario" title="${log.usuario}">${log.usuario}</span>
            <span><span class="log-acao-badge ${acao}">${icAcao} ${nomeAcao}</span></span>
            <span><span class="log-sistema-badge ${sis}">${icSis} ${nomeSis}</span></span>
            <span class="log-detalhes" title="${log.detalhes || ''}">${log.detalhes || '—'}</span>
            <span class="log-ip" title="${log.ip || ''}">${log.ip || ''}</span>
          </div>
        `;
      }).join('');

    } catch (e) {
      lista.innerHTML = '<div class="sem-dados" style="padding:24px;text-align:center;color:var(--cor-texto-fraco)"><i class="fas fa-exclamation-triangle"></i> Erro ao carregar logs.</div>';
    }
  };

  window.limparFiltros = function () {
    document.getElementById('filtro-usuario').value  = '';
    document.getElementById('filtro-texto').value    = '';
    document.getElementById('filtro-acao').value     = 'todos';
    document.getElementById('filtro-sistema').value  = 'todos';
    document.getElementById('filtro-de').value       = '';
    document.getElementById('filtro-ate').value      = '';
    carregarLogs(1);
  };

  carregarLogs(1);
})();
</script>
