<!DOCTYPE html>
<!--
  ARQUIVO: public/aprovacoes/relatoriosAprovacoes.html
  DESCRIÇÃO: Relatórios do Sistema de Aprovações — Portal WKL
-->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Relatórios — Aprovações</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/menu.css">
    <style>
        :root {
            --bg:      #0f172a;
            --card:    #1e293b;
            --card2:   #243044;
            --text:    #f1f5f9;
            --gray:    #94a3b8;
            --border:  #334155;
            --primary: #3b82f6;
            --green:   #10b981;
            --red:     #ef4444;
            --amber:   #f59e0b;
            --purple:  #8b5cf6;
            --cyan:    #06b6d4;
            --indigo:  #6366f1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .page { max-width: 1400px; margin: 0 auto; padding: 80px 20px 60px; }

        /* ── Cabeçalho ── */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
        }
        .page-header h1 { font-size: 1.5rem; color: var(--indigo); display: flex; align-items: center; gap: 10px; }
        .btn-voltar {
            background: var(--card); border: 1px solid var(--border); color: var(--gray);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
            text-decoration: none; display: flex; align-items: center; gap: 6px;
        }
        .btn-voltar:hover { color: var(--text); border-color: var(--indigo); }

        /* ── Painel de Filtros ── */
        .filtros-panel {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; margin-bottom: 24px;
        }
        .filtros-panel h3 { font-size: 0.8rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; color: var(--indigo); margin-bottom: 16px; }

        /* Período rápido */
        .periodo-rapido { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .btn-periodo {
            background: var(--card2); border: 1px solid var(--border); color: var(--gray);
            padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
            transition: all 0.2s;
        }
        .btn-periodo:hover, .btn-periodo.ativo { background: var(--indigo); border-color: var(--indigo); color: #fff; }

        /* Grid de filtros */
        .filtros-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px;
            margin-bottom: 16px;
        }
        .filtro-group label { display: block; font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; color: var(--gray); margin-bottom: 6px; }
        .filtro-group input, .filtro-group select {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 0.85rem; outline: none;
        }
        .filtro-group input:focus, .filtro-group select:focus { border-color: var(--indigo); }

        /* Status checkboxes */
        .status-checks { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .status-check-label {
            display: flex; align-items: center; gap: 6px; cursor: pointer;
            background: var(--card2); border: 1px solid var(--border); border-radius: 6px;
            padding: 5px 10px; font-size: 0.78rem;
        }
        .status-check-label:hover { border-color: var(--indigo); }
        .status-check-label input { accent-color: var(--indigo); width: 14px; height: 14px; }

        /* Tipo relatório */
        .tipo-btns { display: flex; gap: 10px; }
        .btn-tipo {
            flex: 1; padding: 10px; background: var(--card2); border: 2px solid var(--border);
            border-radius: 8px; color: var(--gray); cursor: pointer; text-align: center; font-size: 0.85rem;
        }
        .btn-tipo.ativo { border-color: var(--indigo); color: var(--indigo); background: rgba(99,102,241,0.1); }

        /* Botão gerar */
        .btn-gerar {
            width: 100%; padding: 13px; background: var(--indigo); border: none; border-radius: 8px;
            color: #fff; font-size: 0.95rem; font-weight: 900; cursor: pointer; letter-spacing: 0.5px;
            transition: background 0.2s; margin-top: 4px;
        }
        .btn-gerar:hover { background: #4f46e5; }
        .btn-gerar:disabled { background: #334155; color: var(--gray); cursor: not-allowed; }

        /* ── Resultados ── */
        #resultado { display: none; }
        .resultado-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
        }
        .resultado-header h2 { font-size: 1.1rem; color: var(--text); }
        .resultado-header span { font-size: 0.8rem; color: var(--gray); }
        .btn-exportar {
            background: var(--green); border: none; color: #fff; padding: 8px 18px;
            border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 700;
        }
        .btn-exportar:hover { background: #059669; }

        /* ── Cards de totais ── */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .card-stat {
            background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 16px; text-align: center;
        }
        .card-stat .val { font-size: 2rem; font-weight: 900; line-height: 1; }
        .card-stat .lbl { font-size: 0.72rem; color: var(--gray); text-transform: uppercase;
            letter-spacing: 0.5px; margin-top: 6px; }
        .card-stat .sub { font-size: 0.7rem; color: var(--gray); margin-top: 4px; }
        .c-total    .val { color: var(--indigo); }
        .c-pendente .val { color: var(--amber); }
        .c-aprovado .val { color: var(--green); }
        .c-reprovado .val { color: var(--red); }
        .c-cancelado .val { color: var(--gray); }
        .c-tempo    .val { color: var(--cyan); font-size: 1.4rem; }

        /* ── Seção ── */
        .secao { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .secao h3 { font-size: 0.75rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 1px; color: var(--gray); margin-bottom: 16px; }

        /* Gráfico de barras CSS */
        .bar-chart { display: flex; flex-direction: column; gap: 10px; }
        .bar-row { display: grid; grid-template-columns: 200px 1fr 60px; align-items: center; gap: 10px; }
        .bar-label { font-size: 0.82rem; text-align: right; color: var(--text); white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; }
        .bar-track { background: rgba(255,255,255,0.05); border-radius: 4px; height: 20px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .bar-count { font-size: 0.82rem; font-weight: 700; color: var(--text); }

        /* Tabelas */
        .tbl-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
        th { background: rgba(255,255,255,0.05); color: var(--gray); font-weight: 700;
            text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.5px;
            padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(51,65,85,0.4); vertical-align: middle; }
        tr:hover td { background: rgba(255,255,255,0.03); }
        tr:last-child td { border-bottom: none; }
        .td-num { text-align: right; font-variant-numeric: tabular-nums; }
        .td-center { text-align: center; }

        /* Taxa barra inline */
        .taxa-bar { display: flex; align-items: center; gap: 8px; }
        .taxa-track { flex: 1; background: rgba(255,255,255,0.05); border-radius: 3px; height: 6px; min-width: 60px; }
        .taxa-fill  { height: 100%; border-radius: 3px; background: var(--green); }
        .taxa-pct   { font-size: 0.75rem; color: var(--green); font-weight: 700; min-width: 36px; text-align: right; }

        /* Ordenação nas colunas */
        .th-sort { cursor: pointer; user-select: none; white-space: nowrap; }
        .th-sort:hover { color: var(--indigo); }
        .th-sort i.fa-sort, .th-sort i.fa-sort-up, .th-sort i.fa-sort-down { font-size: 0.6rem; margin-left: 4px; opacity: 0.4; }
        .th-sort.asc i, .th-sort.desc i { opacity: 1; color: var(--indigo); }

        /* Filtros na tabela */
        .filtros-tabela th { padding: 4px 6px; background: rgba(255,255,255,0.02); }
        .filtros-tabela input,
        .filtros-tabela select {
            width: 100%; padding: 5px 8px; font-size: 0.75rem;
            background: rgba(15,23,42,0.8); color: var(--text); border: 1px solid var(--border);
            border-radius: 4px; outline: none;
        }
        .filtros-tabela input:focus,
        .filtros-tabela select:focus { border-color: var(--indigo); }
        .filtros-tabela input::placeholder { color: var(--gray); opacity: 0.6; }

        /* Badges */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
        .b-pendente  { background: rgba(245,158,11,0.15);  color: #f59e0b; }
        .b-aprovado  { background: rgba(16,185,129,0.15);  color: #10b981; }
        .b-reprovado { background: rgba(239,68,68,0.15);   color: #ef4444; }
        .b-cancelado { background: rgba(100,116,139,0.2);  color: #94a3b8; }

        /* Loading */
        .loading { display: flex; align-items: center; justify-content: center; padding: 40px;
            color: var(--gray); gap: 12px; font-size: 0.9rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { width: 20px; height: 20px; border: 2px solid var(--border);
            border-top-color: var(--indigo); border-radius: 50%; animation: spin 0.7s linear infinite; }

        /* Sem dados */
        .sem-dados { text-align: center; padding: 30px; color: var(--gray); font-size: 0.85rem; }

        /* Paginação */
        .paginacao { display: flex; align-items: center; justify-content: space-between;
            margin-top: 16px; flex-wrap: wrap; gap: 10px; }
        .paginacao span { font-size: 0.8rem; color: var(--gray); }
        .pag-btns { display: flex; gap: 6px; }
        .btn-pag {
            background: var(--card2); border: 1px solid var(--border); color: var(--gray);
            padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
        }
        .btn-pag:hover { border-color: var(--indigo); color: var(--text); }
        .btn-pag:disabled { opacity: 0.3; cursor: not-allowed; }

        @media (max-width: 640px) {
            .filtros-grid { grid-template-columns: 1fr; }
            .bar-row { grid-template-columns: 120px 1fr 50px; }
        }
    </style>
</head>
<body>
<div id="menu-container"></div>
<div class="page">

    <!-- Filtros -->
    <div class="filtros-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <h3 style="margin:0;"><i class="fas fa-filter"></i> Filtros</h3>
            <a href="/aprovacoes" class="btn-voltar"><i class="fas fa-arrow-left"></i> Aprovações</a>
        </div>

        <!-- Período rápido -->
        <div class="periodo-rapido">
            <button class="btn-periodo" onclick="setPeriodo('hoje',this)">Hoje</button>
            <button class="btn-periodo" onclick="setPeriodo('semana',this)">Esta Semana</button>
            <button class="btn-periodo ativo" onclick="setPeriodo('mes',this)">Este Mês</button>
            <button class="btn-periodo" onclick="setPeriodo('trimestre',this)">Trimestre</button>
            <button class="btn-periodo" onclick="setPeriodo('ano',this)">Este Ano</button>
            <button class="btn-periodo" onclick="setPeriodo('custom',this)">Personalizado</button>
        </div>

        <!-- Datas customizadas -->
        <div id="datas-custom" class="filtros-grid" style="display:none">
            <div class="filtro-group">
                <label>Data Início</label>
                <input type="date" id="f-di">
            </div>
            <div class="filtro-group">
                <label>Data Fim</label>
                <input type="date" id="f-df">
            </div>
        </div>

        <!-- Criador, Consenso, Tipo de relatório -->
        <div class="filtros-grid">
            <div class="filtro-group">
                <label>Criador / Solicitante</label>
                <select id="f-criador">
                    <option value="">Todos</option>
                </select>
            </div>
            <div class="filtro-group">
                <label>Tipo de Consenso</label>
                <select id="f-consenso">
                    <option value="">Todos</option>
                    <option value="unanimidade">Unanimidade</option>
                    <option value="maioria_simples">Maioria Simples</option>
                    <option value="maioria_qualificada">Maioria Qualificada</option>
                    <option value="quorum_minimo">Quórum Mínimo</option>
                </select>
            </div>
            <div class="filtro-group">
                <label>Tipo de Relatório</label>
                <div class="tipo-btns">
                    <button class="btn-tipo ativo" id="btn-resumido" onclick="setTipo('resumido')">
                        <i class="fas fa-chart-pie"></i> Resumido
                    </button>
                    <button class="btn-tipo" id="btn-detalhado" onclick="setTipo('detalhado')">
                        <i class="fas fa-list"></i> Detalhado
                    </button>
                </div>
            </div>
        </div>

        <!-- Status -->
        <div style="margin-bottom:12px;">
            <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;color:var(--gray);margin-bottom:8px;">
                Status (deixe todos desmarcados = todos)
            </div>
            <div class="status-checks">
                <label class="status-check-label"><input type="checkbox" value="Pendente"> Pendente</label>
                <label class="status-check-label"><input type="checkbox" value="Aprovado"> Aprovado</label>
                <label class="status-check-label"><input type="checkbox" value="Reprovado"> Reprovado</label>
                <label class="status-check-label"><input type="checkbox" value="Cancelado"> Cancelado</label>
            </div>
        </div>

        <button class="btn-gerar" id="btn-gerar" onclick="gerarRelatorio()">
            <i class="fas fa-sync-alt"></i> GERAR RELATÓRIO
        </button>
    </div>

    <!-- Resultados -->
    <div id="resultado"></div>

</div>

<script src="/js/menu.js"></script>
<script>
    // ── Estado ───────────────────────────────────────────────
    let tipoAtual    = 'resumido';
    let periodoAtual = 'mes';
    let dadosDetalhados = [];
    let paginaAtual     = 1;
    const POR_PAGINA    = 50;

    // ── Helpers de data ──────────────────────────────────────
    function fmtDate(d) {
        if (!d) return '—';
        return new Date(d).toLocaleString('pt-BR', { dateStyle:'short', timeStyle:'short' });
    }
    function fmtDuracao(min) {
        if (min == null || min < 0) return '—';
        const h = Math.floor(min / 60), m = min % 60;
        if (h === 0) return m + 'min';
        if (h < 24)  return h + 'h ' + (m > 0 ? m + 'min' : '');
        const d = Math.floor(h / 24), hr = h % 24;
        return d + 'd ' + (hr > 0 ? hr + 'h' : '');
    }
    function hoje()       { return new Date().toISOString().slice(0,10); }
    function inicioSemana() {
        const d = new Date(), day = d.getDay();
        d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
        return d.toISOString().slice(0,10);
    }
    function inicioMes()  { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; }
    function inicioTrimestre() {
        const d = new Date(), m = d.getMonth(), q = Math.floor(m / 3) * 3;
        return `${d.getFullYear()}-${String(q+1).padStart(2,'0')}-01`;
    }
    function inicioAno()  { return `${new Date().getFullYear()}-01-01`; }

    function fimMes() {
        const d = new Date();
        return new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().slice(0, 10);
    }
    function fimTrimestre() {
        const d = new Date(), q = Math.floor(d.getMonth() / 3) * 3 + 2;
        return new Date(d.getFullYear(), q + 1, 0).toISOString().slice(0, 10);
    }
    function fimAno() { return `${new Date().getFullYear()}-12-31`; }
    function fimSemana() {
        const d = new Date(), day = d.getDay();
        d.setDate(d.getDate() + (day === 0 ? 0 : 7 - day));
        return d.toISOString().slice(0, 10);
    }

    function setPeriodo(p, btn) {
        periodoAtual = p;
        document.querySelectorAll('.btn-periodo').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        const custom = document.getElementById('datas-custom');
        if (p === 'custom') { custom.style.display = 'grid'; return; }
        custom.style.display = 'none';
        const map = {
            hoje:      [hoje(), hoje()],
            semana:    [inicioSemana(), fimSemana()],
            mes:       [inicioMes(), fimMes()],
            trimestre: [inicioTrimestre(), fimTrimestre()],
            ano:       [inicioAno(), fimAno()]
        };
        const [di, df] = map[p] || [inicioMes(), fimMes()];
        document.getElementById('f-di').value = di;
        document.getElementById('f-df').value = df;
    }

    function obterPeriodoSelecionado() {
        if (periodoAtual === 'custom') {
            return {
                di: document.getElementById('f-di').value,
                df: document.getElementById('f-df').value
            };
        }
        const map = {
            hoje:      [hoje(), hoje()],
            semana:    [inicioSemana(), fimSemana()],
            mes:       [inicioMes(), fimMes()],
            trimestre: [inicioTrimestre(), fimTrimestre()],
            ano:       [inicioAno(), fimAno()]
        };
        const [di, df] = map[periodoAtual] || [inicioMes(), fimMes()];
        document.getElementById('f-di').value = di;
        document.getElementById('f-df').value = df;
        return { di, df };
    }

    function setTipo(t) {
        tipoAtual = t;
        document.getElementById('btn-resumido').classList.toggle('ativo', t === 'resumido');
        document.getElementById('btn-detalhado').classList.toggle('ativo', t === 'detalhado');
    }

    // ── Carregar criadores ───────────────────────────────────
    async function carregarCriadores() {
        try {
            const r = await fetch('/api/aprovacoes/relatorios?tipo=resumido&dataInicio=2000-01-01&dataFim=2099-12-31');
            if (!r.ok) return;
            const data = await r.json();
            const sel = document.getElementById('f-criador');
            (data.porCriador || []).forEach(c => {
                const o = document.createElement('option');
                o.value = c.login;
                o.textContent = c.nome || c.login;
                sel.appendChild(o);
            });
        } catch {}
    }

    // ── Gerar Relatório ──────────────────────────────────────
    async function gerarRelatorio() {
        const { di, df } = obterPeriodoSelecionado();
        const criador  = document.getElementById('f-criador').value;
        const consenso = document.getElementById('f-consenso').value;
        const checks   = Array.from(document.querySelectorAll('.status-checks input:checked')).map(c => c.value);

        const params = new URLSearchParams({ tipo: tipoAtual });
        if (di)      params.set('dataInicio', di);
        if (df)      params.set('dataFim', df);
        if (criador) params.set('criado_por', criador);
        if (consenso) params.set('tipo_consenso', consenso);
        if (checks.length) params.set('status', checks.join(','));

        const res = document.getElementById('resultado');
        res.style.display = 'block';
        res.innerHTML = '<div class="loading"><div class="spinner"></div> Gerando relatório...</div>';

        const btn = document.getElementById('btn-gerar');
        btn.disabled = true; btn.textContent = 'Aguarde...';

        try {
            const r = await fetch('/api/aprovacoes/relatorios?' + params);
            if (!r.ok) { const e = await r.json(); throw new Error(e.erro || 'Erro ' + r.status); }
            const data = await r.json();
            if (tipoAtual === 'detalhado') renderDetalhado(data);
            else renderResumido(data);
        } catch (e) {
            res.innerHTML = '<div class="loading" style="color:#ef4444"><i class="fas fa-exclamation-triangle"></i> ' + escH(e.message) + '</div>';
        } finally {
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-sync-alt"></i> GERAR RELATÓRIO';
        }
    }

    function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function periodoLabel() {
        const { di, df } = obterPeriodoSelecionado();
        if (di && df) return di.split('-').reverse().join('/') + ' até ' + df.split('-').reverse().join('/');
        if (di) return 'a partir de ' + di.split('-').reverse().join('/');
        return 'Todos os períodos';
    }

    const consensoLabels = {
        unanimidade:          'Unanimidade',
        maioria_simples:      'Maioria Simples',
        maioria_qualificada:  'Maioria Qualificada',
        quorum_minimo:        'Quórum Mínimo'
    };

    // ── Render Resumido ──────────────────────────────────────
    function renderResumido(data) {
        const r   = data.resumo || {};
        const res = document.getElementById('resultado');
        const pctAprov = r.total_geral > 0 ? Math.round(((r.total_aprovados||0) / r.total_geral) * 100) : 0;

        let html = `
        <div class="resultado-header">
            <div>
                <h2>Relatório Resumido — Aprovações</h2>
                <span><i class="fas fa-calendar"></i> ${escH(periodoLabel())}</span>
            </div>
        </div>
        <div class="cards-grid">
            <div class="card-stat c-total">
                <div class="val">${r.total_geral || 0}</div>
                <div class="lbl">Total de Aprovações</div>
            </div>
            <div class="card-stat c-pendente">
                <div class="val">${r.total_pendentes || 0}</div>
                <div class="lbl">Pendentes</div>
            </div>
            <div class="card-stat c-aprovado">
                <div class="val">${r.total_aprovados || 0}</div>
                <div class="lbl">Aprovadas</div>
                <div class="sub">${pctAprov}% do total</div>
            </div>
            <div class="card-stat c-reprovado">
                <div class="val">${r.total_reprovados || 0}</div>
                <div class="lbl">Reprovadas</div>
            </div>
            <div class="card-stat c-cancelado">
                <div class="val">${r.total_cancelados || 0}</div>
                <div class="lbl">Canceladas</div>
            </div>
            <div class="card-stat c-tempo">
                <div class="val">${fmtDuracao(r.tempo_medio_min)}</div>
                <div class="lbl">Tempo Médio de Resolução</div>
                <div class="sub">aprovadas/reprovadas</div>
            </div>
        </div>`;

        // ── Gráfico por Status ──
        const porStatus = data.porStatus || [];
        const maxStatus = porStatus.reduce((m, s) => Math.max(m, s.total), 1);
        const statusColors = {
            'Pendente':'#f59e0b', 'Aprovado':'#10b981',
            'Reprovado':'#ef4444', 'Cancelado':'#64748b'
        };
        html += `<div class="secao"><h3><i class="fas fa-chart-bar"></i> Distribuição por Status</h3>`;
        if (porStatus.length) {
            html += '<div class="bar-chart">';
            porStatus.forEach(s => {
                const pct = Math.round((s.total / maxStatus) * 100);
                const cor = statusColors[s.status] || '#94a3b8';
                html += `<div class="bar-row">
                    <div class="bar-label">${escH(s.status)}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cor}"></div></div>
                    <div class="bar-count">${s.total}</div>
                </div>`;
            });
            html += '</div>';
        } else { html += '<div class="sem-dados">Nenhum dado encontrado</div>'; }
        html += '</div>';

        // ── Gráfico por Tipo de Consenso ──
        const porTipo = data.porTipoConsenso || [];
        const maxTipo = porTipo.reduce((m, t) => Math.max(m, t.total), 1);
        const tipoColors = {
            unanimidade:'#6366f1', maioria_simples:'#3b82f6',
            maioria_qualificada:'#8b5cf6', quorum_minimo:'#06b6d4'
        };
        html += `<div class="secao"><h3><i class="fas fa-gavel"></i> Distribuição por Tipo de Consenso</h3>`;
        if (porTipo.length) {
            html += '<div class="bar-chart">';
            porTipo.forEach(t => {
                const pct = Math.round((t.total / maxTipo) * 100);
                const cor = tipoColors[t.tipo_consenso] || '#94a3b8';
                const lbl = consensoLabels[t.tipo_consenso] || t.tipo_consenso;
                html += `<div class="bar-row">
                    <div class="bar-label">${escH(lbl)}</div>
                    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${cor}"></div></div>
                    <div class="bar-count">${t.total}</div>
                </div>`;
            });
            html += '</div>';
        } else { html += '<div class="sem-dados">Nenhum dado encontrado</div>'; }
        html += '</div>';

        // ── Tabela por Criador ──
        const porCriador = data.porCriador || [];
        html += `<div class="secao"><h3><i class="fas fa-user"></i> Solicitações por Criador</h3>`;
        if (porCriador.length) {
            html += `<div class="tbl-wrap"><table>
                <thead><tr>
                    <th>Criador</th>
                    <th class="td-num">Total</th>
                    <th class="td-num">Pendentes</th>
                    <th class="td-num">Aprovadas</th>
                    <th class="td-num">Reprovadas</th>
                    <th>Taxa de Aprovação</th>
                </tr></thead><tbody>`;
            porCriador.forEach(c => {
                const concluidas = (c.aprovados || 0) + (c.reprovados || 0);
                const taxa = concluidas > 0 ? Math.round(((c.aprovados || 0) / concluidas) * 100) : 0;
                html += `<tr>
                    <td><strong>${escH(c.nome || c.login)}</strong>
                        <span style="display:block;font-size:0.7rem;color:var(--gray)">${escH(c.login)}</span>
                    </td>
                    <td class="td-num"><strong>${c.total}</strong></td>
                    <td class="td-num" style="color:#f59e0b">${c.pendentes || 0}</td>
                    <td class="td-num" style="color:#10b981">${c.aprovados || 0}</td>
                    <td class="td-num" style="color:#ef4444">${c.reprovados || 0}</td>
                    <td>
                        <div class="taxa-bar">
                            <div class="taxa-track"><div class="taxa-fill" style="width:${taxa}%"></div></div>
                            <span class="taxa-pct">${taxa}%</span>
                        </div>
                    </td>
                </tr>`;
            });
            html += '</tbody></table></div>';
        } else { html += '<div class="sem-dados">Nenhum dado encontrado</div>'; }
        html += '</div>';

        res.innerHTML = html;
    }

    // ── Render Detalhado ─────────────────────────────────────
    function renderDetalhado(data) {
        dadosDetalhados = data.aprovacoes || [];
        paginaAtual = 1;
        renderPaginaDetalhada();
    }

    function badgeStatus(s) {
        const map = { 'Pendente':'b-pendente', 'Aprovado':'b-aprovado', 'Reprovado':'b-reprovado', 'Cancelado':'b-cancelado' };
        return `<span class="badge ${map[s]||'b-pendente'}">${escH(s)}</span>`;
    }

    let _dadosFiltrados = [];
    let _sortCol = '';
    let _sortDir = 'asc';

    function renderPaginaDetalhada() {
        // Aplicar filtros locais
        _dadosFiltrados = filtrarDadosDetalhados();

        const total   = _dadosFiltrados.length;
        const inicio  = (paginaAtual - 1) * POR_PAGINA;
        const fim     = Math.min(inicio + POR_PAGINA, total);
        const pagina  = _dadosFiltrados.slice(inicio, fim);
        const totPag  = Math.max(1, Math.ceil(total / POR_PAGINA));
        const res     = document.getElementById('resultado');

        let html = `
        <div class="resultado-header">
            <div>
                <h2>Relatório Detalhado — Aprovações</h2>
                <span><i class="fas fa-calendar"></i> ${escH(periodoLabel())} &bull; ${total} aprovação${total !== 1 ? 'ões' : ''}</span>
            </div>
            <button class="btn-exportar" onclick="exportarCSV()"><i class="fas fa-file-csv"></i> Exportar CSV</button>
        </div>
        <div class="secao">
        <div class="tbl-wrap"><table id="tbl-detalhado">
            <thead>
                <tr>
                    <th class="th-sort" onclick="ordenarTabela('id')">#ID <i class="fas fa-sort"></i></th>
                    <th class="th-sort" onclick="ordenarTabela('titulo')">Título <i class="fas fa-sort"></i></th>
                    <th class="th-sort" onclick="ordenarTabela('criado_por_nome')">Criador <i class="fas fa-sort"></i></th>
                    <th class="th-sort" onclick="ordenarTabela('status')">Status <i class="fas fa-sort"></i></th>
                    <th class="th-sort" onclick="ordenarTabela('tipo_consenso')">Consenso <i class="fas fa-sort"></i></th>
                    <th class="td-center th-sort" onclick="ordenarTabela('total_aprovadores')">Aprovadores <i class="fas fa-sort"></i></th>
                    <th class="td-center th-sort" onclick="ordenarTabela('total_aprovados')">Aprovados <i class="fas fa-sort"></i></th>
                    <th class="td-center th-sort" onclick="ordenarTabela('total_reprovados')">Reprovados <i class="fas fa-sort"></i></th>
                    <th class="td-center">Anexos</th>
                    <th class="th-sort" onclick="ordenarTabela('criado_em')">Criado em <i class="fas fa-sort"></i></th>
                    <th class="th-sort" onclick="ordenarTabela('atualizado_em')">Atualizado em <i class="fas fa-sort"></i></th>
                </tr>
                <tr class="filtros-tabela">
                    <th></th>
                    <th><input type="text" placeholder="Filtrar..." id="ft-titulo" onkeyup="aplicarFiltroTabela()"></th>
                    <th><input type="text" placeholder="Filtrar..." id="ft-criador" onkeyup="aplicarFiltroTabela()"></th>
                    <th><select id="ft-status" onchange="aplicarFiltroTabela()">
                        <option value="">Todos</option>
                        <option value="Pendente">Pendente</option>
                        <option value="Aprovado">Aprovado</option>
                        <option value="Reprovado">Reprovado</option>
                        <option value="Cancelado">Cancelado</option>
                    </select></th>
                    <th><select id="ft-consenso" onchange="aplicarFiltroTabela()">
                        <option value="">Todos</option>
                        <option value="unanimidade">Unanimidade</option>
                        <option value="maioria_simples">Maioria Simples</option>
                        <option value="maioria_qualificada">Maioria Qualificada</option>
                        <option value="quorum_minimo">Quórum Mínimo</option>
                    </select></th>
                    <th></th><th></th><th></th><th></th><th></th><th></th>
                </tr>
            </thead><tbody>`;

        if (!pagina.length) {
            html += `<tr><td colspan="11" class="sem-dados">Nenhuma aprovação encontrada</td></tr>`;
        } else {
            html += renderLinhasDetalhado(pagina);
        }

        html += `</tbody></table></div>
        <div class="paginacao">
            <span>Página ${paginaAtual} de ${totPag} &bull; Exibindo ${inicio+1}–${fim} de ${total}</span>
            <div class="pag-btns">
                <button class="btn-pag" onclick="irPagina(1)" ${paginaAtual===1?'disabled':''}>«</button>
                <button class="btn-pag" onclick="irPagina(${paginaAtual-1})" ${paginaAtual===1?'disabled':''}>‹ Anterior</button>
                <button class="btn-pag" onclick="irPagina(${paginaAtual+1})" ${paginaAtual===totPag?'disabled':''}>Próxima ›</button>
                <button class="btn-pag" onclick="irPagina(${totPag})" ${paginaAtual===totPag?'disabled':''}>»</button>
            </div>
        </div>
        </div>`;

        res.innerHTML = html;
    }

    function renderLinhasDetalhado(lista) {
        let html = '';
        lista.forEach(a => {
            html += `<tr>
                <td><strong style="color:var(--indigo)">#${a.id}</strong></td>
                <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escH(a.titulo)}">${escH(a.titulo)}</td>
                <td style="font-size:0.8rem">${escH(a.criado_por_nome || a.criado_por)}</td>
                <td>${badgeStatus(a.status)}</td>
                <td style="font-size:0.78rem;color:var(--gray)">${escH(consensoLabels[a.tipo_consenso] || a.tipo_consenso || '—')}</td>
                <td class="td-center">${a.total_aprovadores || 0}</td>
                <td class="td-center" style="color:#10b981">${a.total_aprovados || 0}</td>
                <td class="td-center" style="color:#ef4444">${a.total_reprovados || 0}</td>
                <td class="td-center" style="color:#f59e0b">${a.total_anexos > 0 ? a.total_anexos : '—'}</td>
                <td style="font-size:0.78rem;white-space:nowrap">${fmtDate(a.criado_em)}</td>
                <td style="font-size:0.78rem;white-space:nowrap">${fmtDate(a.atualizado_em)}</td>
            </tr>`;
        });
        return html;
    }

    function filtrarDadosDetalhados() {
        const fTitulo   = (document.getElementById('ft-titulo')?.value || '').toLowerCase();
        const fCriador  = (document.getElementById('ft-criador')?.value || '').toLowerCase();
        const fStatus   = document.getElementById('ft-status')?.value || '';
        const fConsenso = document.getElementById('ft-consenso')?.value || '';

        return dadosDetalhados.filter(a => {
            if (fTitulo && !(a.titulo || '').toLowerCase().includes(fTitulo)) return false;
            if (fCriador && !(a.criado_por_nome || a.criado_por || '').toLowerCase().includes(fCriador)) return false;
            if (fStatus && a.status !== fStatus) return false;
            if (fConsenso && a.tipo_consenso !== fConsenso) return false;
            return true;
        });
    }

    function aplicarFiltroTabela() {
        paginaAtual = 1;
        renderPaginaDetalhada();
    }

    function ordenarTabela(col) {
        if (_sortCol === col) {
            _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            _sortCol = col;
            _sortDir = 'asc';
        }

        const numCols = ['id', 'total_aprovadores', 'total_aprovados', 'total_reprovados', 'total_anexos'];
        const dateCols = ['criado_em', 'atualizado_em'];

        dadosDetalhados.sort((a, b) => {
            let vA = a[col], vB = b[col];
            if (numCols.includes(col)) {
                vA = Number(vA || 0); vB = Number(vB || 0);
            } else if (dateCols.includes(col)) {
                vA = new Date(vA || 0).getTime(); vB = new Date(vB || 0).getTime();
            } else {
                vA = (vA || '').toString().toLowerCase();
                vB = (vB || '').toString().toLowerCase();
            }
            if (vA < vB) return _sortDir === 'asc' ? -1 : 1;
            if (vA > vB) return _sortDir === 'asc' ? 1 : -1;
            return 0;
        });

        paginaAtual = 1;
        renderPaginaDetalhada();

        // Atualizar ícones
        document.querySelectorAll('.th-sort').forEach(th => {
            th.classList.remove('asc', 'desc');
            const icon = th.querySelector('i');
            if (icon) icon.className = 'fas fa-sort';
        });
        const headers = document.querySelectorAll('.th-sort');
        headers.forEach(th => {
            const onclick = th.getAttribute('onclick') || '';
            if (onclick.includes(`'${col}'`)) {
                th.classList.add(_sortDir);
                const icon = th.querySelector('i');
                if (icon) icon.className = _sortDir === 'asc' ? 'fas fa-sort-up' : 'fas fa-sort-down';
            }
        });
    }

    function irPagina(p) {
        paginaAtual = p;
        renderPaginaDetalhada();
        document.getElementById('resultado').scrollIntoView({ behavior: 'smooth' });
    }

    // ── Exportar CSV ─────────────────────────────────────────
    function exportarCSV() {
        if (!dadosDetalhados.length) return alert('Nenhum dado para exportar.');
        const cols  = ['id','titulo','criado_por_nome','criado_por','status','tipo_consenso','total_aprovadores','total_aprovados','total_reprovados','total_anexos','criado_em','atualizado_em'];
        const heads = ['ID','Título','Criador','Login','Status','Consenso','Total Aprovadores','Aprovados','Reprovados','Anexos','Criado em','Atualizado em'];
        const esc = v => '"' + String(v ?? '').replace(/"/g,'""') + '"';
        const rows = [heads.join(';')].concat(dadosDetalhados.map(a =>
            cols.map(col => {
                if (col === 'criado_em' || col === 'atualizado_em')
                    return esc(a[col] ? new Date(a[col]).toLocaleString('pt-BR') : '');
                if (col === 'tipo_consenso') return esc(consensoLabels[a[col]] || a[col] || '');
                return esc(a[col]);
            }).join(';')
        ));
        const blob = new Blob(['\uFEFF' + rows.join('\r\n')], { type:'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url;
        a.download = 'aprovacoes_' + new Date().toISOString().slice(0,10) + '.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    // ── Init ─────────────────────────────────────────────────
    window.onload = async () => {
        const btnInicial = document.querySelector('.btn-periodo.ativo');
        if (btnInicial) setPeriodo('mes', btnInicial);
        else {
            document.getElementById('f-di').value = inicioMes();
            document.getElementById('f-df').value = fimMes();
        }
        await carregarCriadores();
        gerarRelatorio();
    };
</script>
</body>
</html>
