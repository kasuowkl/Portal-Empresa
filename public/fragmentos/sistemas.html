<!-- FRAGMENTO: Sistemas -->
<div class="barra-acoes">
  <h3><i class="fas fa-th-large"></i> Sistemas</h3>
  <button class="btn btn-primario btn-sm" onclick="abrirModalSistema()">
    <i class="fas fa-plus"></i> Novo Sistema
  </button>
</div>

<div id="alerta-sistemas" class="alerta" style="margin-bottom:14px"></div>

<div class="tabela-wrapper">
  <table class="tabela">
    <thead>
      <tr>
        <th>Ícone</th>
        <th>Nome</th>
        <th>URL</th>
        <th>Descrição</th>
        <th>Status</th>
        <th style="text-align:center">Nova Aba</th>
        <th style="text-align:center">Usuários</th>
        <th class="col-acoes">Ações</th>
      </tr>
    </thead>
    <tbody id="tbody-sistemas">
      <tr><td colspan="8" style="text-align:center;padding:24px;color:var(--cor-texto-fraco)">
        <i class="fas fa-spinner fa-spin"></i> Carregando...
      </td></tr>
    </tbody>
  </table>
</div>

<!-- Modal de sistema -->
<div id="modal-sistema" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-titulo">
        <i class="fas fa-th-large"></i>
        <span id="modal-sistema-titulo">Novo Sistema</span>
      </div>
      <button class="modal-fechar" onclick="fecharModalSistema()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-corpo">
      <input type="hidden" id="sistema-id">
      <div class="form-grupo">
        <label>Nome do sistema</label>
        <input type="text" id="sistema-nome" placeholder="Ex: Agenda Financeira">
      </div>
      <div class="form-grupo">
        <label>URL de acesso</label>
        <input type="text" id="sistema-url" placeholder="Ex: http://192.168.0.80:3001">
      </div>
      <div class="form-grupo">
        <label>Ícone <small style="color:var(--cor-texto-fraco)">(classe Font Awesome, ex: fa-dollar-sign)</small></label>
        <input type="text" id="sistema-icone" placeholder="fa-window-maximize">
      </div>
      <div class="form-grupo">
        <label>Descrição</label>
        <input type="text" id="sistema-descricao" placeholder="Breve descrição do sistema">
      </div>
      <div class="form-grupo" style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <input type="checkbox" id="sistema-nova-aba" style="width:18px;height:18px;cursor:pointer;accent-color:var(--cor-destaque)">
        <label for="sistema-nova-aba" style="margin:0;cursor:pointer">Abrir em nova aba</label>
      </div>
      <div class="form-grupo" style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
        <input type="checkbox" id="sistema-visivel-usuarios" style="width:18px;height:18px;cursor:pointer;accent-color:var(--cor-destaque)">
        <label for="sistema-visivel-usuarios" style="margin:0;cursor:pointer">Visível para usuários comuns</label>
      </div>
      <!-- Preview do ícone -->
      <div style="text-align:center;padding:14px 0;color:var(--cor-destaque)">
        <i id="preview-icone" class="fas fa-window-maximize" style="font-size:2rem"></i>
        <div style="font-size:0.8em;color:var(--cor-texto-fraco);margin-top:4px">Preview do ícone</div>
      </div>
    </div>
    <div class="modal-rodape">
      <button class="btn btn-sm" onclick="fecharModalSistema()" style="width:auto;background:var(--cor-fundo-3);color:var(--cor-texto)">Cancelar</button>
      <button class="btn btn-primario btn-sm" onclick="salvarSistema()" style="width:auto">
        <i class="fas fa-save"></i> Salvar
      </button>
    </div>
  </div>
</div>

<script>
(function () {
  carregarSistemas();

  async function carregarSistemas() {
    const tbody = document.getElementById('tbody-sistemas');
    try {
      const resp  = await fetch('/api/sistemas-admin');
      if (resp.status === 401) { window.location.href = '/login.html'; return; }
      const dados = await resp.json();

      if (!dados.sistemas || dados.sistemas.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="sem-dados"><i class="fas fa-th-large"></i>Nenhum sistema cadastrado.</td></tr>';
        return;
      }

      tbody.innerHTML = dados.sistemas.map(s => `
        <tr>
          <td style="text-align:center"><i class="fas ${s.icone}" style="font-size:1.3rem;color:var(--cor-destaque)"></i></td>
          <td><strong>${s.nome}</strong></td>
          <td><a href="${s.url}" target="_blank" style="font-size:0.82em">${s.url}</a></td>
          <td style="color:var(--cor-texto-fraco);font-size:0.88em">${s.descricao || '—'}</td>
          <td style="text-align:center">${s.nova_aba ? '<i class="fas fa-external-link-alt" title="Abre em nova aba" style="color:var(--cor-destaque);font-size:0.9rem"></i>' : '<span style="opacity:0.3">—</span>'}</td>
          <td style="text-align:center">${s.visivel_usuarios ? '<i class="fas fa-eye" title="Visível para usuários" style="color:var(--cor-sucesso);font-size:0.9rem"></i>' : '<i class="fas fa-eye-slash" title="Apenas admins" style="color:var(--cor-texto-fraco);font-size:0.9rem"></i>'}</td>
          <td><span class="badge badge-${s.ativo ? 'ativo' : 'inativo'}">${s.ativo ? 'Ativo' : 'Inativo'}</span></td>
          <td class="col-acoes">
            <button class="btn-icone editar" title="Editar" onclick='editarSistema(${JSON.stringify(s)})'><i class="fas fa-edit"></i></button>
            <button class="btn-icone ativar" title="${s.ativo ? 'Desativar' : 'Ativar'}" onclick="toggleSistema(${s.id}, ${!s.ativo})">
              <i class="fas fa-${s.ativo ? 'eye-slash' : 'eye'}"></i>
            </button>
            <button class="btn-icone excluir" title="Excluir" onclick="excluirSistema(${s.id}, '${s.nome}')"><i class="fas fa-trash"></i></button>
          </td>
        </tr>
      `).join('');
    } catch (e) {
      tbody.innerHTML = '<tr><td colspan="8" class="sem-dados"><i class="fas fa-exclamation-triangle"></i>Erro ao carregar sistemas.</td></tr>';
    }
  }

  // Atualiza preview do ícone ao digitar
  document.getElementById('sistema-icone').addEventListener('input', function () {
    const preview = document.getElementById('preview-icone');
    preview.className = `fas ${this.value || 'fa-window-maximize'}`;
  });

  window.abrirModalSistema = function () {
    document.getElementById('sistema-id').value           = '';
    document.getElementById('sistema-nome').value         = '';
    document.getElementById('sistema-url').value          = '';
    document.getElementById('sistema-icone').value        = '';
    document.getElementById('sistema-descricao').value    = '';
    document.getElementById('sistema-nova-aba').checked          = false;
    document.getElementById('sistema-visivel-usuarios').checked  = true;
    document.getElementById('preview-icone').className           = 'fas fa-window-maximize';
    document.getElementById('modal-sistema-titulo').textContent = 'Novo Sistema';
    document.getElementById('modal-sistema').classList.add('visivel');
  };

  window.editarSistema = function (s) {
    document.getElementById('sistema-id').value          = s.id;
    document.getElementById('sistema-nome').value        = s.nome;
    document.getElementById('sistema-url').value         = s.url;
    document.getElementById('sistema-icone').value       = s.icone;
    document.getElementById('sistema-descricao').value   = s.descricao || '';
    document.getElementById('sistema-nova-aba').checked         = !!s.nova_aba;
    document.getElementById('sistema-visivel-usuarios').checked = s.visivel_usuarios !== false && s.visivel_usuarios !== 0;
    document.getElementById('preview-icone').className   = `fas ${s.icone}`;
    document.getElementById('modal-sistema-titulo').textContent = 'Editar Sistema';
    document.getElementById('modal-sistema').classList.add('visivel');
  };

  window.fecharModalSistema = function () {
    document.getElementById('modal-sistema').classList.remove('visivel');
  };

  window.salvarSistema = async function () {
    const id        = document.getElementById('sistema-id').value;
    const nome      = document.getElementById('sistema-nome').value.trim();
    const url       = document.getElementById('sistema-url').value.trim();
    const icone     = document.getElementById('sistema-icone').value.trim() || 'fa-window-maximize';
    const descricao = document.getElementById('sistema-descricao').value.trim();
    const nova_aba         = document.getElementById('sistema-nova-aba').checked;
    const visivel_usuarios = document.getElementById('sistema-visivel-usuarios').checked;

    if (!nome) { mostrarAlerta('Informe o nome do sistema.', 'erro'); return; }
    if (!url)  { mostrarAlerta('Informe a URL do sistema.', 'erro'); return; }

    try {
      const resp = await fetch(id ? `/api/sistemas/${id}` : '/api/sistemas', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nome, url, icone, descricao, nova_aba, visivel_usuarios })
      });

      const dados = await resp.json();
      if (!resp.ok) { mostrarAlerta(dados.erro, 'erro'); return; }

      fecharModalSistema();
      mostrarAlerta(dados.mensagem, 'sucesso');
      carregarSistemas();
    } catch (e) {
      mostrarAlerta('Erro de comunicação.', 'erro');
    }
  };

  window.toggleSistema = async function (id, ativo) {
    try {
      const resp  = await fetch(`/api/sistemas/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ativo })
      });
      const dados = await resp.json();
      mostrarAlerta(dados.mensagem || dados.erro, resp.ok ? 'sucesso' : 'erro');
      if (resp.ok) carregarSistemas();
    } catch (e) {
      mostrarAlerta('Erro de comunicação.', 'erro');
    }
  };

  window.excluirSistema = async function (id, nome) {
    if (!confirm(`Excluir o sistema "${nome}"?\nEsta ação não pode ser desfeita.`)) return;
    try {
      const resp  = await fetch(`/api/sistemas/${id}`, { method: 'DELETE' });
      const dados = await resp.json();
      mostrarAlerta(dados.mensagem || dados.erro, resp.ok ? 'sucesso' : 'erro');
      if (resp.ok) carregarSistemas();
    } catch (e) {
      mostrarAlerta('Erro de comunicação.', 'erro');
    }
  };

  function mostrarAlerta(msg, classe) {
    const el = document.getElementById('alerta-sistemas');
    el.className = `alerta alerta-${classe} visivel`;
    el.textContent = msg;
    setTimeout(() => el.classList.remove('visivel'), 4000);
  }

  document.getElementById('modal-sistema').addEventListener('click', function (e) {
    if (e.target === this) fecharModalSistema();
  });
})();
</script>
