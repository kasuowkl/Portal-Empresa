<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatorios - Agenda Contabil</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/menu.css">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #243044;
      --surface: #111b30;
      --text: #f1f5f9;
      --gray: #94a3b8;
      --border: #334155;
      --primary: #3b82f6;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --blue: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: "Segoe UI", sans-serif; min-height: 100vh; }
    .page { max-width: 1400px; margin: 0 auto; padding: 80px 20px 60px; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
    }
    .page-header h1 { font-size: 1.5rem; color: var(--primary); display: flex; align-items: center; gap: 10px; }
    .btn-voltar, .btn-exportar, .btn-pag {
      background: var(--card); border: 1px solid var(--border); color: var(--gray);
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
      text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-voltar:hover, .btn-pag:hover { color: var(--text); border-color: var(--primary); }
    .btn-exportar { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn-exportar:hover { background: #2563eb; }
    .filtros-panel {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; margin-bottom: 24px;
    }
    .filtros-panel h3 {
      font-size: 0.8rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: 1px; color: var(--primary); margin-bottom: 16px;
    }
    .periodo-rapido { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .btn-periodo {
      background: var(--card2); border: 1px solid var(--border); color: var(--gray);
      padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.8rem;
      transition: all 0.2s;
    }
    .btn-periodo:hover, .btn-periodo.ativo { background: var(--primary); border-color: var(--primary); color: #fff; }
    .filtros-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px;
      margin-bottom: 16px;
    }
    .filtro-group label {
      display: block; font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; color: var(--gray); margin-bottom: 6px;
    }
    .filtro-group input, .filtro-group select {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 0.85rem; outline: none;
    }
    .filtro-group input:focus, .filtro-group select:focus { border-color: var(--primary); }
    .tipo-btns { display: flex; gap: 10px; }
    .btn-tipo {
      flex: 1; padding: 10px; background: var(--card2); border: 2px solid var(--border);
      border-radius: 8px; color: var(--gray); cursor: pointer; text-align: center; font-size: 0.85rem;
    }
    .btn-tipo.ativo { border-color: var(--primary); color: var(--blue); background: rgba(59,130,246,0.1); }
    .btn-gerar {
      width: 100%; padding: 13px; background: var(--primary); border: none; border-radius: 8px;
      color: #fff; font-size: 0.95rem; font-weight: 900; cursor: pointer; letter-spacing: 0.5px;
      transition: background 0.2s; margin-top: 4px;
    }
    .btn-gerar:hover { background: #2563eb; }
    .btn-gerar:disabled { background: #334155; color: var(--gray); cursor: not-allowed; }
    #resultado { display: none; }
    .resultado-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
    }
    .resultado-header h2 { font-size: 1.1rem; color: var(--text); }
    .resultado-header span { font-size: 0.8rem; color: var(--gray); }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .card-stat {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px; text-align: center;
    }
    .card-stat .val { font-size: 1.6rem; font-weight: 900; line-height: 1; }
    .card-stat .val.val-brl { font-size: 1.1rem; }
    .card-stat .lbl {
      font-size: 0.72rem; color: var(--gray); text-transform: uppercase;
      letter-spacing: 0.5px; margin-top: 6px;
    }
    .c-total .val { color: var(--blue); }
    .c-valor .val, .c-pago .val { color: var(--green); }
    .c-pend .val { color: var(--amber); }
    .c-venc .val { color: var(--red); }
    .secao {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 20px; margin-bottom: 20px;
    }
    .secao h3 {
      font-size: 0.75rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: 1px; color: var(--gray); margin-bottom: 16px;
    }
    .bar-chart { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: grid; grid-template-columns: 160px 1fr 110px; align-items: center; gap: 10px; }
    .bar-label {
      font-size: 0.82rem; text-align: right; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .bar-track { background: rgba(255,255,255,0.05); border-radius: 4px; height: 20px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; background: var(--primary); }
    .bar-count { font-size: 0.78rem; font-weight: 700; color: var(--text); text-align: right; }
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
    th {
      background: rgba(255,255,255,0.05); color: var(--gray); font-weight: 700;
      text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.5px;
      padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border);
    }
    td { padding: 10px 12px; border-bottom: 1px solid rgba(51,65,85,0.4); vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    tr:last-child td { border-bottom: none; }
    .td-num { text-align: right; font-variant-numeric: tabular-nums; }
    .agendas-check-list {
      display: flex; flex-wrap: wrap; gap: 8px 16px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; max-height: 120px; overflow-y: auto;
    }
    .agendas-check-list label {
      display: flex; align-items: center; gap: 6px; font-size: 0.82rem;
      cursor: pointer; white-space: nowrap; color: var(--text);
    }
    .agendas-check-list input[type="checkbox"] {
      accent-color: var(--primary); width: 15px; height: 15px; cursor: pointer;
    }
    .agendas-check-list .check-todos {
      font-weight: 700; color: var(--primary); border-right: 1px solid var(--border);
      padding-right: 16px; margin-right: 4px;
    }
    .loading-sm { color: var(--gray); font-size: 0.8rem; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: 700; }
    .b-pago { background: rgba(16,185,129,0.15); color: #10b981; }
    .b-pend { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .b-venc { background: rgba(239,68,68,0.15); color: #ef4444; }
    .b-lanc { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .loading {
      display: flex; align-items: center; justify-content: center; padding: 40px;
      color: var(--gray); gap: 12px; font-size: 0.9rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    .sem-dados { text-align: center; padding: 30px; color: var(--gray); font-size: 0.85rem; }
    .paginacao {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 16px; flex-wrap: wrap; gap: 10px;
    }
    .paginacao span { font-size: 0.8rem; color: var(--gray); }
    .btn-pag:disabled { opacity: 0.3; cursor: not-allowed; }
    .secao-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    @media (max-width: 768px) {
      .filtros-grid { grid-template-columns: 1fr; }
      .bar-row { grid-template-columns: 100px 1fr 90px; }
      .secao-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="menu-container"></div>
<div class="page">
  <div class="page-header">
    <h1><i class="fas fa-chart-line"></i> Relatorios da Agenda Contabil</h1>
    <a href="/agendaContabil" class="btn-voltar"><i class="fas fa-arrow-left"></i> Agenda Contabil</a>
  </div>

  <div class="filtros-panel">
    <h3><i class="fas fa-filter"></i> Filtros</h3>

    <div class="periodo-rapido">
      <button class="btn-periodo" onclick="setPeriodo('hoje', this)">Hoje</button>
      <button class="btn-periodo" onclick="setPeriodo('semana', this)">Esta Semana</button>
      <button class="btn-periodo ativo" onclick="setPeriodo('mes', this)">Este Mes</button>
      <button class="btn-periodo" onclick="setPeriodo('trimestre', this)">Trimestre</button>
      <button class="btn-periodo" onclick="setPeriodo('ano', this)">Este Ano</button>
      <button class="btn-periodo" onclick="setPeriodo('custom', this)">Personalizado</button>
    </div>

    <div id="datas-custom" class="filtros-grid" style="display:none">
      <div class="filtro-group">
        <label>Data Inicio</label>
        <input type="date" id="f-di">
      </div>
      <div class="filtro-group">
        <label>Data Fim</label>
        <input type="date" id="f-df">
      </div>
    </div>

    <div class="filtro-group" style="margin-bottom:12px;">
      <label>Agendas</label>
      <div id="f-agendas-check" class="agendas-check-list">
        <span class="loading-sm">Carregando...</span>
      </div>
    </div>

    <div class="filtros-grid">
      <div class="filtro-group">
        <label>Categoria</label>
        <select id="f-categoria">
          <option value="">Todas as categorias</option>
        </select>
      </div>
      <div class="filtro-group">
        <label>Empresa</label>
        <select id="f-empresa">
          <option value="">Todas as empresas</option>
        </select>
      </div>
      <div class="filtro-group">
        <label>Status</label>
        <select id="f-status">
          <option value="todos">Todos</option>
          <option value="pendente">Pendente</option>
          <option value="lancado">Lancado</option>
          <option value="pago">Pago</option>
          <option value="vencido">Vencido</option>
        </select>
      </div>
      <div class="filtro-group">
        <label>Tipo de Relatorio</label>
        <div class="tipo-btns">
          <button class="btn-tipo ativo" id="btn-resumido" onclick="setTipo('resumido')">
            <i class="fas fa-chart-pie"></i> Resumido
          </button>
          <button class="btn-tipo" id="btn-detalhado" onclick="setTipo('detalhado')">
            <i class="fas fa-list"></i> Detalhado
          </button>
        </div>
      </div>
    </div>

    <button class="btn-gerar" id="btn-gerar" onclick="gerarRelatorio()">
      <i class="fas fa-sync-alt"></i> GERAR RELATORIO
    </button>
  </div>

  <div id="resultado"></div>
</div>

<script src="/js/menu.js"></script>
<script>
  const API = '/api/contabil';
  let tipoAtual = 'resumido';
  let paginaAtual = 1;
  let dadosDetalhados = [];

  function hoje() { return new Date().toISOString().slice(0, 10); }
  function inicioSemana() { const d = new Date(); const day = d.getDay(); d.setDate(d.getDate() - (day === 0 ? 6 : day - 1)); return d.toISOString().slice(0, 10); }
  function inicioMes() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-01`; }
  function inicioTrimestre() { const d = new Date(); const q = Math.floor(d.getMonth() / 3) * 3; return `${d.getFullYear()}-${String(q + 1).padStart(2, '0')}-01`; }
  function inicioAno() { return `${new Date().getFullYear()}-01-01`; }
  function fimMes() { const d = new Date(); return new Date(d.getFullYear(), d.getMonth() + 1, 0).toISOString().slice(0, 10); }
  function fimTrimestre() { const d = new Date(); const q = Math.floor(d.getMonth() / 3) * 3 + 2; return new Date(d.getFullYear(), q + 1, 0).toISOString().slice(0, 10); }
  function fimAno() { return `${new Date().getFullYear()}-12-31`; }
  function fimSemana() { const d = new Date(); const day = d.getDay(); d.setDate(d.getDate() + (day === 0 ? 0 : 7 - day)); return d.toISOString().slice(0, 10); }

  function fmtData(d) {
    if (!d) return '-';
    const dt = new Date(d);
    return dt.toLocaleDateString('pt-BR', { timeZone: 'UTC' });
  }

  function fmtBRL(v) {
    return Number(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function badgeStatus(status) {
    const mapa = { pago: 'b-pago', pendente: 'b-pend', vencido: 'b-venc', lancado: 'b-lanc' };
    return `<span class="badge ${mapa[status] || 'b-pend'}">${String(status || '-').toUpperCase()}</span>`;
  }

  async function api(url) {
    const r = await fetch(url);
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.erro || 'Erro desconhecido');
    return d;
  }

  function setPeriodo(p, btn) {
    document.querySelectorAll('.btn-periodo').forEach((b) => b.classList.remove('ativo'));
    btn.classList.add('ativo');
    const custom = document.getElementById('datas-custom');
    if (p === 'custom') {
      custom.style.display = 'grid';
      return;
    }
    custom.style.display = 'none';
    const mapa = {
      hoje: [hoje(), hoje()],
      semana: [inicioSemana(), fimSemana()],
      mes: [inicioMes(), fimMes()],
      trimestre: [inicioTrimestre(), fimTrimestre()],
      ano: [inicioAno(), fimAno()]
    };
    const intervalo = mapa[p] || [inicioMes(), fimMes()];
    document.getElementById('f-di').value = intervalo[0];
    document.getElementById('f-df').value = intervalo[1];
  }

  function setTipo(t) {
    tipoAtual = t;
    document.getElementById('btn-resumido').classList.toggle('ativo', t === 'resumido');
    document.getElementById('btn-detalhado').classList.toggle('ativo', t === 'detalhado');
  }

  async function carregarAgendas() {
    const data = await api(`${API}/agendas`);
    const agendas = data.agendas || [];
    const params = new URLSearchParams(window.location.search);
    const agendaAtual = params.get('agenda_id');
    const container = document.getElementById('f-agendas-check');
    let html = '<label class="check-todos"><input type="checkbox" id="chk-todas" checked onchange="toggleTodasAgendas(this.checked)"> Todas</label>';
    agendas.forEach((agenda) => {
      const checked = !agendaAtual || String(agenda.id) === String(agendaAtual);
      html += `<label><input type="checkbox" class="chk-agenda" value="${agenda.id}" ${checked ? 'checked' : ''} onchange="onAgendaCheck()"> ${agenda.nome}</label>`;
    });
    container.innerHTML = html;
    onAgendaCheck();
  }

  function toggleTodasAgendas(checked) {
    document.querySelectorAll('.chk-agenda').forEach((c) => { c.checked = checked; });
    carregarFiltrosGlobais();
  }

  function onAgendaCheck() {
    const checks = document.querySelectorAll('.chk-agenda');
    const marcados = [...checks].filter((c) => c.checked);
    const todas = checks.length > 0 && marcados.length === checks.length;
    const chkTodas = document.getElementById('chk-todas');
    if (chkTodas) chkTodas.checked = todas;
    carregarFiltrosGlobais();
  }

  function getAgendasSelecionadas() {
    return [...document.querySelectorAll('.chk-agenda:checked')].map((c) => c.value);
  }

  async function carregarFiltrosGlobais() {
    const ids = getAgendasSelecionadas();
    const selCat = document.getElementById('f-categoria');
    const selEmp = document.getElementById('f-empresa');
    const atualCat = selCat.value;
    const atualEmp = selEmp.value;
    selCat.innerHTML = '<option value="">Todas as categorias</option>';
    selEmp.innerHTML = '<option value="">Todas as empresas</option>';

    try {
      const catSet = new Set();
      const empSet = new Set();
      for (const id of ids) {
        const retorno = await Promise.all([
          api(`${API}/agendas/${id}/grupos`),
          api(`${API}/agendas/${id}/clientes`)
        ]);
        (retorno[0].grupos || []).forEach((g) => catSet.add(g.nome));
        (retorno[1].clientes || []).forEach((e) => empSet.add(e.nome));
      }
      [...catSet].sort().forEach((nome) => {
        const o = document.createElement('option');
        o.value = nome;
        o.textContent = nome;
        selCat.appendChild(o);
      });
      [...empSet].sort().forEach((nome) => {
        const o = document.createElement('option');
        o.value = nome;
        o.textContent = nome;
        selEmp.appendChild(o);
      });
      if ([...catSet].includes(atualCat)) selCat.value = atualCat;
      if ([...empSet].includes(atualEmp)) selEmp.value = atualEmp;
    } catch (erro) {
      console.error('Erro ao carregar filtros:', erro);
    }
  }

  function montarParams(pg = 1) {
    const params = new URLSearchParams({ tipo: tipoAtual });
    const di = document.getElementById('f-di').value;
    const df = document.getElementById('f-df').value;
    const agIds = getAgendasSelecionadas();
    const categoria = document.getElementById('f-categoria').value;
    const empresa = document.getElementById('f-empresa').value;
    const status = document.getElementById('f-status').value;
    if (di) params.set('dataInicio', di);
    if (df) params.set('dataFim', df);
    if (agIds.length) params.set('agenda_ids', agIds.join(','));
    if (categoria) params.set('categoria', categoria);
    if (empresa) params.set('empresa', empresa);
    if (status) params.set('status', status);
    if (tipoAtual === 'detalhado') params.set('page', pg);
    return params.toString();
  }

  function renderGrafico(titulo, icone, lista, chave) {
    let html = `<div class="secao"><h3><i class="${icone}"></i> ${titulo}</h3>`;
    if (!lista.length) return html + '<div class="sem-dados">Nenhum dado encontrado</div></div>';
    const max = Math.max(...lista.map((item) => Number(item.valor || 0)), 1);
    html += '<div class="bar-chart">';
    lista.forEach((item) => {
      const pct = ((Number(item.valor || 0) / max) * 100).toFixed(1);
      html += `
        <div class="bar-row">
          <div class="bar-label" title="${item[chave] || '-'}">${item[chave] || '-'}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <div class="bar-count">${fmtBRL(item.valor || 0)}</div>
        </div>`;
    });
    return html + '</div></div>';
  }

  function renderTabelaResumo(titulo, chave, lista, totalGeral) {
    const base = Number(totalGeral || 0) || 1;
    let html = `<div class="secao"><h3><i class="fas fa-table"></i> ${titulo}</h3><div class="tbl-wrap"><table><thead><tr><th>${chave === 'categoria' ? 'Categoria' : 'Empresa'}</th><th class="td-num">Itens</th><th class="td-num">Valor</th><th class="td-num">% do Total</th></tr></thead><tbody>`;
    lista.forEach((item) => {
      const pct = ((Number(item.valor || 0) / base) * 100).toFixed(1);
      html += `<tr><td>${item[chave] || '-'}</td><td class="td-num">${item.total || 0}</td><td class="td-num">${fmtBRL(item.valor || 0)}</td><td class="td-num">${pct}%</td></tr>`;
    });
    return html + '</tbody></table></div></div>';
  }

  function renderResumo(data, di, df) {
    const r = data.resumo || {};
    const periodo = di && df ? `${fmtData(di)} - ${fmtData(df)}` : 'Periodo selecionado';
    let html = `
      <div class="resultado-header">
        <div>
          <h2>Resumo Contabil</h2>
          <span><i class="fas fa-calendar-alt"></i> ${periodo}</span>
        </div>
      </div>
      <div class="cards-grid">
        <div class="card-stat c-total"><div class="val">${r.total || 0}</div><div class="lbl">Total de Itens</div></div>
        <div class="card-stat c-valor"><div class="val val-brl">${fmtBRL(r.total_valor)}</div><div class="lbl">Valor Total</div></div>
        <div class="card-stat c-pend"><div class="val">${r.pendentes || 0}</div><div class="lbl">Pendentes</div></div>
        <div class="card-stat c-pend"><div class="val val-brl">${fmtBRL(r.valor_pendente)}</div><div class="lbl">Valor Pendente</div></div>
        <div class="card-stat c-pago"><div class="val">${r.pagos || 0}</div><div class="lbl">Pagos</div></div>
        <div class="card-stat c-pago"><div class="val val-brl">${fmtBRL(r.valor_pago)}</div><div class="lbl">Valor Pago</div></div>
        <div class="card-stat c-total"><div class="val">${r.lancados || 0}</div><div class="lbl">Lancados</div></div>
        <div class="card-stat c-venc"><div class="val">${r.vencidos || 0}</div><div class="lbl">Vencidos</div></div>
        <div class="card-stat c-venc"><div class="val val-brl">${fmtBRL(r.valor_vencido)}</div><div class="lbl">Valor Vencido</div></div>
      </div>`;
    html += '<div class="secao-grid">';
    html += renderGrafico('Por Categoria', 'fas fa-tag', data.por_categoria || [], 'categoria');
    html += renderGrafico('Por Empresa', 'fas fa-building', data.por_empresa || [], 'empresa');
    html += '</div>';
    if ((data.por_categoria || []).length) html += renderTabelaResumo('Detalhamento por Categoria', 'categoria', data.por_categoria || [], r.total_valor || 0);
    if ((data.por_empresa || []).length) html += renderTabelaResumo('Detalhamento por Empresa', 'empresa', data.por_empresa || [], r.total_valor || 0);
    return html;
  }

  function renderDetalhado(data, di, df) {
    const itens = data.itens || [];
    dadosDetalhados = itens;
    const totalPaginas = Math.max(1, Math.ceil((data.total || 0) / (data.por_pagina || 50)));
    const periodo = di && df ? `${fmtData(di)} - ${fmtData(df)}` : 'Periodo selecionado';
    let html = `
      <div class="resultado-header">
        <div>
          <h2>Relatorio Detalhado</h2>
          <span><i class="fas fa-calendar-alt"></i> ${periodo}</span>
        </div>
        <button class="btn-exportar" onclick="exportarCSV()"><i class="fas fa-file-export"></i> Exportar CSV</button>
      </div>
      <div class="secao">
        <h3><i class="fas fa-list"></i> Itens Encontrados</h3>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Agenda</th>
                <th>Descricao</th>
                <th>Emissao</th>
                <th>Vencimento</th>
                <th>Categoria</th>
                <th>Empresa</th>
                <th>Status</th>
                <th class="td-num">Valor</th>
              </tr>
            </thead>
            <tbody>`;
    if (!itens.length) {
      html += '<tr><td colspan="8" class="sem-dados">Nenhum item encontrado.</td></tr>';
    } else {
      itens.forEach((item) => {
        html += `<tr><td>${item.agenda_nome || '-'}</td><td>${item.titulo || '-'}</td><td>${fmtData(item.data_emissao)}</td><td>${fmtData(item.vencimento)}</td><td>${item.categoria_nome || '-'}</td><td>${item.empresa_nome || '-'}</td><td>${badgeStatus(item.status)}</td><td class="td-num">${fmtBRL(item.valor)}</td></tr>`;
      });
    }
    html += `</tbody></table></div><div class="paginacao"><span>Pagina ${paginaAtual} de ${totalPaginas} - ${data.total || 0} registros</span><div style="display:flex; gap:6px;"><button class="btn-pag" onclick="gerarRelatorio(${paginaAtual - 1})" ${paginaAtual <= 1 ? 'disabled' : ''}>Anterior</button><button class="btn-pag" onclick="gerarRelatorio(${paginaAtual + 1})" ${paginaAtual >= totalPaginas ? 'disabled' : ''}>Proxima</button></div></div></div>`;
    return html;
  }

  async function gerarRelatorio(pg = 1) {
    const agIds = getAgendasSelecionadas();
    if (!agIds.length) {
      alert('Selecione pelo menos uma agenda.');
      return;
    }
    paginaAtual = Math.max(1, pg);
    const resultado = document.getElementById('resultado');
    const di = document.getElementById('f-di').value;
    const df = document.getElementById('f-df').value;
    resultado.style.display = 'block';
    resultado.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando relatorio...</div>';
    document.getElementById('btn-gerar').disabled = true;
    try {
      const data = await api(`${API}/relatorios?${montarParams(paginaAtual)}`);
      resultado.innerHTML = tipoAtual === 'resumido' ? renderResumo(data, di, df) : renderDetalhado(data, di, df);
    } catch (erro) {
      resultado.innerHTML = `<div class="secao"><div class="sem-dados"><i class="fas fa-exclamation-circle"></i> ${erro.message}</div></div>`;
    } finally {
      document.getElementById('btn-gerar').disabled = false;
    }
  }

  function exportarCSV() {
    if (!dadosDetalhados.length) {
      alert('Gere um relatorio detalhado para exportar.');
      return;
    }
    const linhas = [
      ['Agenda', 'Descricao', 'Data Emissao', 'Vencimento', 'Categoria', 'Empresa', 'Status', 'Valor'],
      ...dadosDetalhados.map((item) => [item.agenda_nome || '', item.titulo || '', fmtData(item.data_emissao), fmtData(item.vencimento), item.categoria_nome || '', item.empresa_nome || '', item.status || '', Number(item.valor || 0).toFixed(2).replace('.', ',')])
    ];
    const csv = linhas.map((linha) => linha.map((campo) => `"${String(campo).replaceAll('"', '""')}"`).join(';')).join('\r\n');
    const blob = new Blob([`\ufeff${csv}`], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `relatorio-agenda-contabil-${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(link);
    link.click();
    link.remove();
    URL.revokeObjectURL(link.href);
  }

  document.addEventListener('DOMContentLoaded', async () => {
    setPeriodo('mes', document.querySelector('.btn-periodo.ativo'));
    await carregarAgendas();
    await gerarRelatorio();
  });
</script>
</body>
</html>
